<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCI-MTSS Alignment Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;background:#F4F6F9;color:#1a1a1a;min-height:100vh}

.site-header{background:linear-gradient(135deg,#003865 0%,#1B4F8A 60%,#2E6DB4 100%);
  padding:28px 40px 24px;position:relative;overflow:hidden}
.site-header::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 24px)}
.site-header h1{font-family:'Playfair Display',serif;font-size:1.75rem;color:#fff;position:relative;z-index:1;letter-spacing:-.02em}
.site-header p{color:rgba(255,255,255,.65);font-size:.88rem;margin-top:5px;font-weight:300;position:relative;z-index:1}

.ef-selector-wrap{background:#fff;border-bottom:1px solid #DDE3EA;padding:18px 40px 16px}
.ef-selector-label{font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#aaa;margin-bottom:10px}
.ef-row{display:flex;gap:8px;flex-wrap:wrap}
.ef-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 16px 9px;
  border:2px solid #E0E6ED;border-radius:10px;background:#fff;cursor:pointer;
  transition:all .18s;box-shadow:0 1px 4px rgba(0,0,0,.06);min-width:100px;text-align:center;
  font-family:'Source Sans 3',sans-serif}
.ef-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.11)}
.ef-btn.active{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.14)}
.ef-btn .num{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;line-height:1}
.ef-btn .lbl{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#666;line-height:1.3}

.main{padding:28px 40px 80px;max-width:1060px;margin:0 auto}

.sec-hd{display:flex;align-items:center;gap:10px;margin:28px 0 14px}
.sec-hd-lbl{font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#888;white-space:nowrap}
.sec-hd-rule{flex:1;height:1px;background:#DDE3EA}

.ef-banner{border-radius:13px;padding:24px 28px;position:relative;overflow:hidden;margin-bottom:4px}
.ef-banner::after{content:attr(data-n);font-family:'Playfair Display',serif;font-size:8rem;font-weight:700;
  color:rgba(255,255,255,.07);position:absolute;right:18px;bottom:-16px;line-height:1;pointer-events:none}
.ef-banner .eyebrow{font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.ef-banner h2{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:10px;line-height:1.3}
.ef-banner .stmt{font-size:.93rem;color:rgba(255,255,255,.85);font-style:italic;border-left:3px solid rgba(255,255,255,.28);padding-left:13px;line-height:1.6}

.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.crit-card{background:#fff;border-radius:10px;border-left:5px solid;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.crit-card-label{font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ratio-pill{padding:2px 9px;border-radius:20px;font-size:.65rem;font-weight:700}
.crit-body{font-size:.84rem;line-height:1.72;color:#2a2a2a}
.crit-body .ch{font-weight:700;display:block;margin-top:10px;margin-bottom:1px}
.crit-body .b{display:block;padding-left:16px;margin:1px 0}
.crit-body .sb{display:block;padding-left:28px;margin:1px 0;color:#555}

.mod-list{display:flex;flex-direction:column;gap:7px}
.mod-row{background:#fff;border-radius:10px;border:1.5px solid #E0E6ED;
  overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:box-shadow .18s}
.mod-row:hover{box-shadow:0 4px 14px rgba(0,0,0,.10)}
.mod-trigger{display:flex;align-items:center;gap:10px;padding:13px 16px;
  cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'Source Sans 3',sans-serif}
.mod-trigger .arrow{font-size:.75rem;color:#bbb;transition:transform .2s;margin-left:auto;flex-shrink:0}
.mod-row.open .mod-trigger .arrow{transform:rotate(90deg)}
.mod-name{font-size:.90rem;font-weight:700;color:#1a1a1a}
.mod-body{display:none;border-top:1px solid #EEF0F4}
.mod-row.open .mod-body{display:block}

.sub-ef-list{padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.sub-ef-row{border-radius:8px;border:1.5px solid #E8EAED;overflow:hidden;background:#F8F9FB}
.sub-ef-trigger{display:flex;align-items:center;gap:10px;padding:9px 13px;
  cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:'Source Sans 3',sans-serif}
.sub-ef-row.open .sub-ef-trigger .sub-arrow{transform:rotate(90deg)}
.sub-arrow{font-size:.68rem;color:#bbb;transition:transform .2s;flex-shrink:0}
.sub-ef-stmt{font-size:.83rem;font-weight:600;color:#222;line-height:1.4;flex:1;text-align:left}
.sub-ef-body{display:none;border-top:1px solid #E8EAED;padding:14px 16px}
.sub-ef-row.open .sub-ef-body{display:block}

.ef-tag-row{display:flex;align-items:baseline;gap:7px;margin-bottom:4px}
.ef-tag-name{font-size:.82rem;font-weight:600}
.fit-pill{font-size:.61rem;font-weight:700;padding:1px 7px;border-radius:10px;
  text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;border:1px solid}

.crit-section{margin-top:12px}
.crit-section-hd{font-size:.62rem;font-weight:700;letter-spacing:.10em;text-transform:uppercase;
  margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #E8EAED}
.crit-section-body{font-size:.82rem;line-height:1.70;color:#333}
.crit-section-body .ch{font-weight:700;display:block;margin-top:8px;margin-bottom:1px}
.crit-section-body .b{display:block;padding-left:14px;margin:1px 0}
.crit-section-body .sb{display:block;padding-left:26px;margin:1px 0;color:#555}

.ds-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:0}
.ds-tab{padding:6px 14px;border-radius:20px;border:1.5px solid #DDE3EA;background:#fff;
  cursor:pointer;font-size:.78rem;font-weight:600;font-family:'Source Sans 3',sans-serif;
  transition:all .18s;color:#555}
.ds-panel{display:none}
.ds-panel.active{display:block}
.ds-advisory{margin:12px 0 16px;background:#FFF8E6;border:1px solid #FFD966;
  border-radius:8px;padding:11px 15px;font-size:.83rem;color:#6B4D00;line-height:1.60}
.ds-cat{margin-bottom:18px}
.ds-cat-hd{font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding-bottom:6px;border-bottom:2px solid;margin-bottom:7px}
.ds-item{background:#fff;border-radius:8px;padding:11px 15px;margin-bottom:5px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);font-size:.84rem;line-height:1.6;color:#222;border-left:3px solid}
.no-content{color:#bbb;font-size:.87rem;padding:14px 0}

@media(max-width:700px){
  .site-header,.ef-selector-wrap,.main{padding-left:18px;padding-right:18px}
  .criteria-grid{grid-template-columns:1fr}
  .ef-btn{min-width:80px}
}
</style>
</head>
<body>
<div class="site-header">
  <h1>DCI-MTSS Alignment Explorer</h1>
  <p>Select an Essential Function to view proficiency criteria, aligned modules, and data sources.</p>
</div>
<div class="ef-selector-wrap">
  <div class="ef-selector-label">Essential Function</div>
  <div class="ef-row" id="efRow"></div>
</div>
<div class="main" id="main">
  <div style="color:#bbb;text-align:center;padding:60px 0;font-size:.95rem;">Select an Essential Function above to begin.</div>
</div>
<script>
const D={"efs":{"1":{"num":"1","title":"Collaborative Culture and Climate","statement":"District leaders maintain a collaborative culture and climate to build capacity for an outcome-driven approach to school improvement.","exemplary":"A.\tThe District Leadership Team (DLT) works collaboratively to implement continuous improvement by meeting 9/9 the following criteria. \n•\tIncluding members on the team who are in a position to make decisions on behalf of the system\n•\tIncluding members on the team with expertise in policy, instruction, literacy, behavior, curriculum, assessment, technology, special education, preschool, elementary, middle, and high school\n•\tMeeting monthly to collaborate and monitor implementation\n•\tIdentifying a district-level contact person who acts as the primary contact for reciprocal communication with the Coaching Support Team (CST) facilitator\n•\tCollaborating with building leaders to define building-level expectations, develop action plans, collect data, and monitor progress toward improving literacy, instruction, and behavior. \n•\tIdentifying building-level contacts who act as the primary contact for reciprocal communication between their building and the DLT\n•\tEstablishing a communication protocol that allows for the sharing of data between teams and with stakeholders\n•\tRegularly disseminating information regarding DCI-MTSS implementation, data, and accomplishments to all staff and stakeholders through established communication protocols\n•\tInvolving a range of stakeholders including families, mental health specialists, and local community members to refine and improve programs\nB.\tThe DLT uses a protocol to review all district work, initiatives, and programs to assure current and ongoing alignment with the district Comprehensive School Improvement Plan (CSIP). The protocol consists of 3/3 of the following criteria. \n•\tAn inventory of all district initiatives to identify redundancies and inconsistencies\n•\tA process for selecting, reviewing, identifying, and de-implementing ineffective initiatives or programs\n•\tPersons designated with responsibility for following the protocol and communicating to district/building leaders regarding alignment\nC.\tThe DLT annually develops and uses an action plan that is aligned with the existing CSIP and the district professional development plan. This action plan meets 9/9 of the following criteria. \n•\tIs aligned to district goals\n•\tIdentifies and is informed by data elements \n•\tContains annual measurable goals and outcomes matched to data sources\n•\tIncludes action steps with an implementation timeline \n•\tIncludes a schedule for the annual collection and evaluation of data sources at the district, building, and classroom levels\n•\tIncludes a professional development plan for training and coaching in the district’s priority area(s)\n•\tCreates structures and processes for collaborative problem-solving using data\n•\tCreates structures and processes for internal school-based coaching\n•\tIncludes a process for onboarding new staff annually","proficient":"A.\tThe DLT works collaboratively to implement continuous improvement by meeting 7/9 of the exemplary criteria, including the following. \n•\tIncluding members on the team who are in a position to make decisions on behalf of the system\n•\tIncluding members with expertise in policy, instruction, literacy, behavior, curriculum, assessment, technology, special education, preschool, elementary, middle, and high school\n•\tMeeting monthly to collaborate and monitor implementation\n•\tIdentifying a district-level contact person who acts as the primary contact for reciprocal communication with the Coaching Support Team (CST) facilitator\nB.\tThe DLT uses a protocol to review all district work, initiatives, and programs to assure current and ongoing alignment with the district Comprehensive School Improvement Plan (CSIP). The protocol consists of 2/3 of the exemplary criteria, including the following criteria. \n•\tA process for selecting, reviewing, identifying, and de-implementing ineffective initiatives or programs\nC.\tThe DLT annually develops and uses an action plan that is aligned with the existing CSIP and the district professional development plan. This action plan meets 7/9 of the exemplary criteria and includes the following. \n•\tIs aligned to district goals\n•\tIdentifies and is informed by data elements \n•\tContains annual measurable goals and outcomes matched to data sources\n•\tIncludes action steps with an implementation timeline \n•\tIncludes a professional development plan for training and coaching in the district’s priority area(s)"},"2":{"num":"2","title":"Assessment","statement":"District leaders maintain an assessment system designed to support educational teams in making informed, instructional, and programmatic decisions to support students.","exemplary":"A.\tThe District Leadership Team (DLT) has developed an assessment system that includes tools and processes to measure essential components of academics (literacy and instruction) and behavior.  The plan includes 9/9 of the following criteria.\n•\tDistrict tools for\no\tUniversal screening\no\tDiagnostic and functional assessment tool \no\tProgress monitoring \no\tOutcome measures\n•\tA data collection calendar for the school year\n•\tThe individuals who will administer the assessments\n•\tThe individuals who will enter the data/scores (if applicable)\n•\tThe individuals/team(s) who will use the results\n•\tThe individual(s) who will serve as data coordinator(s)\n•\tA process to modify the assessment system based on data\n•\tA process to select and deselect assessment tools/processes\n•\tA process to ensure fidelity of implementation\nB.\tThe DLT has developed a process to ensure learners and families are informed about assessments. The process includes 2/2 of the following criteria.  \n•\tNotifying learners and their families of assessment purposes, frequency, and dates\n•\tOffering support to learners and their families on how to interpret assessments","proficient":"A.\tThe DLT has developed an assessment system that includes tools and processes to measure essential components of academics (literacy and instruction) and behavior. The plan meets 7/9 of the exemplary criteria and includes the following.\n•\tDistrict tools for\no\tUniversal screening \no\tDiagnostic and functional assessment tool \no\tProgress monitoring \no\tOutcome measures\n•\tThe individual(s) who will serve as data coordinator(s)\n•\tA process to ensure fidelity of implementation\n\nB.\tThe DLT has developed a process to ensure learners and families are informed about assessments. The process includes the following criteria.  \n•\tNotifying learners and their families of assessment purposes, frequency, and dates."},"3":{"num":"3","title":"Data-Based Decision Making","statement":"District leaders engage in cycles of data-based decision making for their system to meet the needs of all students.","exemplary":"A.\tThe DLT maintains an ongoing cycle of data-based decision making that includes 9/9 of the following criteria. \n•\tAnalysis of data related to outcomes and progress \n•\tAnalysis of data related to fidelity of implementation \n•\tAnalysis of needs and progress of all students, with explicit consideration for special populations\n•\tDetermination regarding the effectiveness of the district-wide system and needs\n•\tDetermination of district-wide and building-level status and needs for professional development using CWIS, SAS, SAPP, Literacy Progress Monitoring Tool, Office Referrals, MAP, and other relevant data \n•\tDetermination of priority areas of need and benchmarks for improvement\n•\tIdentification of strategies and interventions to address needs within the system\n•\tIdentification of training and coaching needs to address improved instruction, interventions, and to build on strengths\n•\tSharing of data and collaboration with building leaders, teachers, and stakeholders\nB.\tThe DLT supports building and collaborative teams in on-going data-based decision making by meeting 4/4 of the following criteria. \n•\tClearly identified DBDM teams meet regularly to conduct data-based decision making at the building and collaborative team levels\n•\tDBDM teams have a clear and consistent understanding of their roles and responsibilities to analyze data and use those data to impact change\n•\tDBDM teams have been trained in a data-based decision making process that is used consistently to guide decisions\n•\tThere is a process for information from collaborative teams and building teams to be communicated to the DLT","proficient":"A.\tThe DLT maintains an ongoing cycle of data-based decision making that includes 7/9 of the exemplary criteria and includes the following. \n•\tAnalysis of data related to outcomes and progress\n•\tAnalysis of data related to fidelity of implementation \n•\tAnalysis of needs and progress of all students, with explicit consideration for special populations"},"4":{"num":"4","title":"Tiered System of Support","statement":"District leaders maintain a tiered system of supports that provides efficient, effective, and equitable allocation of resources to support all students.","exemplary":"A.\tThe DLT has developed and documented a tiered system of support for academics (literacy and instruction) and behavior that meets 8/8 of the following criteria.\n•\tA process to identify and support tiered interventions matched to student need\n•\tAn equitable allocation of resources (fiscal, personnel, time, facilities, etc.) to support a tiered framework of instructional practices\n•\tAlignment of instructional resources used across Tiers 1, 2, and 3\n•\tA process for how learners will be identified as needing intervention (i.e., what data will be collected, by what date, by whom, entrance/exit criteria)\n•\tA description of the continuum of interventions and practices at all education levels\n•\tProtocols for individualization (e.g., changing the intervention in response to ongoing progress monitoring to address the learner’s needs)\n•\tProtocols for communicating and collaborating with necessary stakeholders (staff, learners, families, community partners)\n•\tA process to ensure fidelity of implementation\nB.\tThe DLT has developed a process for buildings to engage families as meaningful stakeholders in the implementation of the tiered system of support. The process includes 2/2 of the following criteria. \n•\tFamilies have opportunities to learn how the district has defined Tiers 1, 2 and 3, and specific strategies for families to support learner success\n•\tCommunication for families regarding the description, purpose, anticipated duration, and at-home support needed in a language and format that is conducive to the needs of families","proficient":"A.\tThe DLT has developed and documented a tiered system of support for academics (literacy and instruction) and behavior that meets 6/8 of the exemplary criteria and includes the following.\n•\tA process to identify and support tiered interventions matched to student need\n•\tAlignment of instructional resources used across Tiers 1, 2, and 3\n•\tA description of the continuum of interventions and practices at all education levels\n\nB.\tThe DLT has developed a process for buildings to engage families as meaningful stakeholders in the implementation of the tiered system of support."},"5":{"num":"5","title":"Effective Teaching and Learning Practices","statement":"District leaders select and align effective teaching and learning practices to increase the probability that instruction, interventions, and supports meet the needs of all students.","exemplary":"The DLT collaborates with buildings to select and align effective teaching and learning practices at Tiers 1, 2, and 3 from a menu of district approved and supported practices, interventions, and supports that meet 5/5 of the following criteria. \n•\tAre evidence-based and grounded in research\n•\tAddress essential academic (literacy and instruction) and behavior components\n•\tMatch the needs identified by district data\n•\tFit within the capacity of the district to be successfully implemented (e.g., staff, financial, professional learning, buy-in)\n•\tAre aligned with community, regional, and/or state priorities, as well as family and community values and culture \nThe DLT collaborates with buildings to implement with high fidelity effective teaching and learning practices and interventions and supports at Tiers 1, 2 and 3 that have been approved and are supported by the DLT. Implementation meets 4/4 of the following criteria. \n•\tEducators have received specific training to use the practices, interventions, and supports for which they are responsible to provide\n•\tEducators are provided internal coaching as they implement new practices, interventions, and supports\n•\tInternal coaching includes descriptive feedback and support for improvement\n•\tAn ongoing process is in place to monitor fidelity of implementation of specified practices, interventions, and supports","proficient":"A.\tThe DLT collaborates with buildings to select and align effective teaching and learning practices at Tiers 1, 2, and 3. The selection process includes practices, interventions, and supports that meet 4/4 of the following criteria.\n•\tAre evidence-based and grounded in research \n•\tAddress essential academic (literacy and instruction) and behavior components \n•\tMatch the needs identified by district data  \n•\tFit within the capacity of the district to be successfully implemented (e.g., staff, financial, professional learning, buy-in)\nB.\tThe DLT collaborates with buildings to implement effective teaching and learning practices and interventions and supports at Tiers 1, 2 and 3. Implementation meets 3/4 of the exemplary criteria."},"6":{"num":"6","title":"Integration and Sustainability","statement":"District leaders provide staff with ongoing support to ensure the integration and sustainability of their continuous improvement efforts.","exemplary":"A.\tThe DLT works collaboratively towards the integration and sustainability of their continuous improvement efforts by meeting 9/9 of the following criteria. \n•\tEnsuring practices and policies are aligned\n•\tDeveloping policies to guide implementation\n•\tRegularly reviewing learner data to determine successes\n•\tReviewing data related to implementation fidelity\n•\tMaking changes to the district action plan as guided by data\n•\tDeveloping a long-range professional development plan for staff and administrators based on data and aligned to effective teaching and learning practices\n•\tWorking to enhance staff motivation and capacity to be actively involved in decision making\n•\tEnsuring new DLT members receive professional development on district-level implementation and district-level roles","proficient":"A.\tThe DLT works collaboratively towards the integration and sustainability of their continuous improvement efforts by meeting 7/9 of the exemplary criteria including the following. \n•\tRegularly reviewing learner data to determine successes\n•\tReviewing data related to implementation fidelity\n•\tMaking changes to the district action plan as guided by data \n•\tDeveloping a long-range professional development plan for staff and administrators based on data and aligned to effective teaching and learning practices"}},"modules":{"Building Leadership Team for Behavior":{"primary":["1","3","5"],"secondary":["2","4","6"],"sub_efs":[{"ef_stmt":"1 A building leadership team has been established that is representative of the school and meets on a monthly basis.","exemplary":"Exemplary = an average of 11-12 total points\nProfessional learning has been developed and provided to all instructional staff on\nthe importance and impact of positive consequences on student behavior and school climate.\nthe use of preferred adult behaviors (e.g., eye contact, smiling, use of students’ name, listening, etc.).\neffectively using positive specific feedback.","proficient":"Proficient = an average of 9-10 total points","ef_alignment":{"1":"Primary","5":"Secondary","6":"Secondary"}},{"ef_stmt":"2 The building leadership team has established efficient and effective meeting structures that include working agreements, meeting agenda and notes format, and decision making procedures.","exemplary":"Exemplary = an average of 14-16 total points\n\nThe building leadership team has engaged all staff in identifying\nthe expected student behaviors in all non classroom settings that will receive consistent adult encouragement.\nthe specific manner in which positive, specific feedback will be delivered by all staff to all students (e.g., verbal, verbal with tangibles, group contingencies, etc.).\nthe frequency or ratio with which all staff are to deliver encouragement to all students.\nthe manner in which the use of schoolwide encouragement will be\nmonitored.","proficient":"Proficient = an average of 12-13total points","ef_alignment":{"1":"Primary","2":"Secondary","3":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 The building leadership team has assigned team member roles and a system for collaborative learning.","exemplary":"Exemplary = an average of 14-16 total points\n\nThe building leadership team has engaged all instructional staff in identifying\nthe expected student behaviors in all classroom settings that will receive consistent adult encouragement.\nthe specific manner in which positive, specific feedback will be delivered by all instructional staff to all students in classroom settings (e.g.,\nverbal, verbal with tangibles, group contingencies, etc.).\nthe frequency or ratio with which all instructional staff are to deliver encouragement to all students in classroom settings.\nthe manner in which the use of classroom encouragement will be\nmonitored.","proficient":"Proficient = an average of 12-13total points","ef_alignment":{"1":"Secondary","2":"Secondary","3":"Secondary","4":"Secondary","5":"Primary","6":"Secondary"}}]},"Discouraging Unexpected Behavior":{"primary":["1","2","3","4","5"],"secondary":["6"],"sub_efs":[{"ef_stmt":"1 The building leadership team has implemented the systems to define “Major” or office-managed unexpected behavior, a form to capture “Major” behaviors and the systems needed to collect “Major” data for decision-making.","exemplary":"Exemplary = an average of 11-12 total points\nThe building leadership team has\nengaged all staff in clearly defining “Major” or office- managed unexpected behavior.\ncreated an office discipline referral form (ODR form) to capture all instances of “Major” behavior.\nestablished and implemented schoolwide procedures for completing and submitting ODR forms.","proficient":"Proficient = an average of 9-10 total points","ef_alignment":{"2":"Primary","3":"Primary","4":"Primary","6":"Secondary"}},{"ef_stmt":"2 The building leadership team has implemented the systems to define “Minor” or classroom-managed unexpected behavior, a schoolwide procedure to monitor\n“Minor” behaviors and effective and consistent instructional response strategies for “Minor” classroom-managed unexpected behaviors.","exemplary":"Exemplary = an average of 14-16 total points\nThe building leadership team has\nengaged all staff in clearly defining “Minor” or classroom- managed unexpected behavior.\ncreated a schoolwide procedure to capture instances of “Minor” or classroom-managed behavior.\ncreated a decision rule of when to document “Minor” behaviors.\nestablished and implemented, effective and consistent schoolwide procedures for responding to “Minor” behaviors, including professional learning opportunities for all\ninstructional staff.","proficient":"Proficient = an average of 12- 13total points","ef_alignment":{"2":"Primary","3":"Primary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 The building leadership team has developed and implemented an effective and consistent schoolwide system to discourage unexpected behavior.","exemplary":"Exemplary = an average of 11-12 total points\n\nThe building leadership team has developed and communicated (e.g., memos, email, newsletter, website, student and/or staff handbooks) to all students, staff and families:\n“Major” office-managed, and “Minor” classroom-managed behavior definitions.\nadult response strategies aligned to the intensity of the unexpected behavior in either a flowchart or behavior intensity levels chart formats.\nThe building leadership team has provided training to all staff on effective and consistent response strategies.","proficient":"Proficient =\nan average\nof 9-10 total\npoints","ef_alignment":{"1":"Primary","2":"Secondary","3":"Secondary","5":"Primary","6":"Secondary"}}]},"Encouraging Expected Behaviors":{"primary":["1","3","4","5","6"],"secondary":[],"sub_efs":[{"ef_stmt":"1 The building leadership team has developed and provided professional learning activities to increase the likelihood that all adults consistently support a positive schoolwide environment.","exemplary":"Exemplary = an average of 11-12 total points\nProfessional learning has been developed and provided to all instructional staff on\nthe importance and impact of positive consequences on student behavior and school climate.\nthe use of preferred adult behaviors (e.g., eye contact, smiling, use of studentsâ€™ name, listening, etc.).\neffectively using positive specific feedback.","proficient":"Proficient = an average of 9-10 total points","ef_alignment":{"1":"Primary","4":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"2 A schoolwide system to encourage students use of expected behaviors and staff use of positive specific feedback in non-classroom settings has been developed.","exemplary":"Exemplary = an average of 14-16 total points\n\nThe building leadership team has engaged all staff in identifying\nthe expected student behaviors in all non classroom settings that will receive consistent adult encouragement.\nthe specific manner in which positive, specific feedback will be delivered by all staff to all students (e.g., verbal, verbal with tangibles, group contingencies, etc.).\nthe frequency or ratio with which all staff are to deliver encouragement to all students.\nthe manner in which the use of schoolwide encouragement will be\nmonitored.","proficient":"Proficient = an average of 12-13total points","ef_alignment":{"1":"Secondary","3":"Primary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 The building leadership team has provided support necessary for each instructional staff member to create a classroom system for encouragement that aligns to the schoolwide system of encouragement.","exemplary":"Exemplary = an average of 14-16 total points\n\nThe building leadership team has engaged all instructional staff in identifying\nthe expected student behaviors in all classroom settings that will receive consistent adult encouragement.\nthe specific manner in which positive, specific feedback will be delivered by all instructional staff to all students in classroom settings (e.g.,\nverbal, verbal with tangibles, group contingencies, etc.).","proficient":"Proficient = an average of 12-13total points","ef_alignment":{"1":"Secondary","3":"Primary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"4 The building leadership team has implemented a system to positively encourage expected behaviors of all adults (e.g., staff and family members).","exemplary":"Exemplary = an average of 18-20 total points\n\nThe building leadership team has developed and communicated (e.g., memos, email, newsletter, website, student and/or staff handbooks)\nexpectations for adult behaviors.\na consistent system to encourage expected adult behaviors.\nthe manner in which the use of encouraging adult expectations will be monitored.\nThe building leadership team has implemented a consistent system to encourage expected adult behaviors (e.g., staff and families).\nThe building leadership team monitors the implementation of the schoolwide system to encourage adult behaviors.","proficient":"Proficient = an average of 15-17\ntotal points","ef_alignment":{"1":"Primary","3":"Secondary","4":"Secondary","5":"Secondary","6":"Secondary"}}]},"Classroom rules/expectations":{"primary":["3","4","5","6"],"secondary":["1","2"],"sub_efs":[{"ef_stmt":"1 The language of the classroom expectations reflects the language of the schoolwide expectations.","exemplary":"Classroom expectation matrix headings are consistent with schoolwide expectation matrix headings reflecting 3-5 expectations (e.g. Be Respectful, Be Responsible, Be Safe)\nThere is evidence of connection across grade level or content area, and clear communication with other adults to support consistent use of common language.","proficient":"Classroom expectation matrix headings are consistent with schoolwide expectation matrix headings reflecting 3-5 expectations (e.g. Be Respectful, Be Responsible, Be Safe)","ef_alignment":{"4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"2 Rules are specific criteria for achieving expectations.","exemplary":"Classroom matrix includes rules with specific descriptions of how students can meet the expectations.\nEvidence of connection across grade-level or content area, and communication to other adults to support consistent use of language (interventionists, volunteers, etc.).","proficient":"Classroom matrix includes rules with specific descriptions of how students can meet the expectations.","ef_alignment":{"4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 Rules meet these 5 guidelines:\n(OMPUA)\nObservable\nMeasureable\nPositively Stated\nUnderstandable\nAlways Applicable","exemplary":"All rules on classroom matrix are consistent with the OMPUA guidelines.  \nLanguage is appropriate for context and culture of the classroom.","proficient":"All rules on classroom matrix are consistent with the OMPUA guidelines.","ef_alignment":{"1":"Secondary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"4 Expectations and rules are taught, modeled, practiced, and feedback is regularly provided.","exemplary":"Lesson plans include schedule for teaching behavioral expectations with modeling and practice, including a process for responding to classroom data for reteaching.  \nPositive and corrective feedback are used to support student success, with higher rates of positive than corrective feedback.","proficient":"Lesson plans include schedule for teaching behavioral expectations with modeling and practice. \nPositive and corrective feedback are used daily and equally to support student success.","ef_alignment":{"2":"Secondary","3":"Primary","4":"Primary","5":"Primary","6":"Primary"}}]},"Collaborative Teams (CT)":{"primary":["1","3","6"],"secondary":["2","4","5"],"sub_efs":[{"ef_stmt":"1 Teams develop a culture of shared responsibility, focused on student impact that promotes collective efficacy.","exemplary":"Teams develop a culture of shared responsibility that builds collective teacher efficacy by demonstrating 8/8 of the following criteria.\n• Build relational trust through modeling of mutual respect, transparency, and risk taking\n• Identify common purposes and goals to improve student outcomes for academics and behavior\n• Believe they are able to impact change\n• Engage in cycles of data-based decision making\n• Identify students needing varying levels of support\n• Align instructional practices to academic standards and behavioral expectations\n• Implement evidence-based instructional practices\n• Establish effective, consistent, and reciprocal communication amongst all stakeholders","proficient":"7/8 criteria are met by educators","ef_alignment":{"1":"Primary","2":"Secondary","3":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"2 Educators structure team meetings to assure authentic and effective collaboration.","exemplary":"Educators structure team meetings to assure authentic and effective collaboration by demonstrating 6/6 of the following criteria.\n• Collaborative Teams are configured multiple ways based on their purpose and goals (grade level, course-alike, vertical, intervention, leadership, behavior, text-book selection, CARE teams).\n• Teacher teams meet at least weekly for 45-60 minutes or more of dedicated/protected time for collaboration.\n• Leadership teams meet at least monthly for 60-90 minutes or more to guide, support, and monitor building-wide collaborative teams.\n• Team members agree on and accept roles that are purposeful, clearly described, and align with their skills.\n• Educators intentionally use collaborative skills during team meetings (problem solving and sharing; pausing; paraphrasing; posing questions; putting ideas on the table; providing data; paying attention to self and others; presuming positive intentions).\n• All members of the team are active participants, intentionally sharing resources, perspectives, and responsibilities to promote effective learning.","proficient":"5/6 criteria are met by educators","ef_alignment":{"1":"Primary","3":"Secondary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"3 Educators effectively use group processes for impactful collaboration.","exemplary":"Educators effectively use group processes for impactful collaboration by demonstrating 3/3 of the following criteria.\n• Teams use agendas which include the following.\no Team name, date, location\no Working agreements/norms\no Assigned roles\no Establish clear objectives\no Review past items\no Celebrations of accomplishments\no Next meeting date, time, and location\no Consistent template for easy reference\n• Team minutes and communication include the following.\no List of the attendees\no Tasks achieved\no Consensus and decisions made\no List of actions agreed upon including to whom it was assigned and the completion due date\no Centrally stored notes with easy access for all participants to provide updates and comments\no Minutes distributed to all stakeholders\n• Teams will effectively establish and use norms for effective and productive collaboration.","proficient":"2/3 criteria are met by educators","ef_alignment":{"1":"Primary","3":"Secondary","4":"Secondary","5":"Secondary","6":"Primary"}}]},"Data-Based Decision Making (DBDM)":{"primary":["1","2","3","5","6"],"secondary":["4"],"sub_efs":[{"ef_stmt":"1 Educators establish collaborative process for collecting data.","exemplary":"Meet 9/9 criteria\n\nCollaborative data team process\nEstablish a data team with members sharing a common interest (content, grade level, etc.)\nMeet at regularly scheduled predetermined times to collaborate on student data\nDefine and use roles to improve meeting effectiveness and efficiency\nUse agendas that clearly outline team meeting goals with an emphasis on using data to inform instruction\nUse a system for sharing and storing team documents (i.e., agenda, minutes, etc.).\nHold team accountable for individual and team review of data\nData collection process\nCollect student data in relation to learning targets\nCollect data describing instructional processes\nOrganize data in preparation for review and analysis","proficient":"7/9 criteria are met\n\nCollaborative data team process\nEstablish a data team with members sharing a common interest (content, grade level, etc.)\nMeet at regularly scheduled predetermined times to collaborate on student data\nDefine and use roles to improve meeting effectiveness and efficiency.\nUse agendas that clearly outline team meeting goals with an emphasis on using data to inform instruction\nData collection process\nCollect student data in relation to learning targets\nCollect data describing instructional processes\nOrganize data in preparation for review and analysis","ef_alignment":{"1":"Primary","2":"Primary","3":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"2 Educators implement a process for examining and interpreting data.","exemplary":"Meet 6/6 criteria\nUse purposeful data analysis system to guide effective data analysis\nConsistently use protocol for data analysis.\nIdentify a common problem that is related to a learning goal\nReflect on how instruction has previously impacted the common problem\nPredict a link to teacher practice\nOrganize and track the data-informed decisions made by the team in order to be available for future problem-solving discussions","proficient":"5/6 criteria are met\nUse purposeful data analysis system to guide effective data analysis\nConsistently use protocol for data analysis\nIdentify a common problem that is related to a learning goal\nReflect on how instruction has previously impacted the common problem\nPredict a link to teacher practice","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"3 Educators determine instructional action steps.","exemplary":"Meet 5/5 criteria\nDevelop a written instructional action plan (IAP) including all parts: Learning Goal, Evidence of Learning, Instructional Change, Method for Examining Instruction, and Impact Analysis\nDesign a lesson or set of lessons addressing the learning goal\nSchedule and deliver instructional change (lesson or set of lessons)\nCollect evidence of learning outlined in the IAP\nOutline how engaging students in review of learning data will inform design or delivery of instructional\nchange","proficient":"4/5 criteria are met\nDevelop a written instructional action plan (IAP) including all parts: Learning Goal, Evidence of Learning, Instructional Change, Method for Examining Instruction, and Impact Analysis\nDesign a lesson or set of lessons addressing the learning goal\nSchedule and deliver instructional change (lesson or set of lessons)\nCollect evidence of learning outlined in the IAP","ef_alignment":{"1":"Secondary","2":"Secondary","3":"Primary","4":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"4 Educators use and act upon data by incorporating teaching and learning data into instruction and adjusting instruction accordingly.","exemplary":"Meet 7/7criteria\n• Review previously created data analysis system and improve it as necessary to determine instructional impact\n• Analyze evidence of learning collected during instructional change\n• Include time in data team meetings to reflect on and discuss what worked, what did not work and why\n• Determine if/how instructional change targeted student learning goal\n• Incorporate review of student data into instruction and gain feedback on student learning from students\n• Schedule time to reflect on the outcome of the instructional change\n• Adjust instructional action plan to reflect findings","proficient":"6/7 criteria are met\n• Review previously created data analysis system and improve it as necessary to determine instructional impact\n• Analyze evidence of learning collected during instructional change\n• Include time in data team meetings to reflect on and discuss what worked, what did not work and why\n• Determine if/how instructional change targeted student learning goal\n• Incorporate review of student data into instruction and gain feedback on student learning from students\n• Schedule time to reflect on the outcome of the instructional change","ef_alignment":{"1":"Secondary","2":"Secondary","4":"Secondary","5":"Primary","6":"Primary"}}]},"Developing Assessment Capable Learners (DACL)":{"primary":["2","5"],"secondary":["3"],"sub_efs":[{"ef_stmt":"1 Educators teach students to determine “Where am I Going?”","exemplary":"When teaching students to develop learning goals, 5/5 criteria occur.\nEducator\n•\tWrites daily targets using student-friendly language, using “I can \t” or “I know\n\t” statements\n•\tCreates daily opportunities for students to use or interact with learning targets\n•\tDevelops rubric or scoring guide for appropriate assignments and provides multiple opportunities for students to use/interact with the rubric/scoring guide during the learning\n•\tAnalyzes sample work with the students using strong and weak examples and asking students to justify their analyses (an ongoing task throughout learning to clarify misconceptions)\n•\tAsks students to set daily goals in relation to the learning targets","proficient":"When teaching students to determine learning goals, 4/5 criteria occur and must include the following.\nEducator\n•\tWrites daily targets using student- friendly language, using “I can\t\t” or “I know \t” statements\n•\tCreates daily opportunities for students to use or interact with learning targets\n•\tAsks students to set daily goals in relation to the learning\ntargets","ef_alignment":{"2":"Primary","3":"Secondary","5":"Primary"}},{"ef_stmt":"2 Educators teach students to determine “Where am I Now?”","exemplary":"When teaching students to self-evaluate learning progress, 5/5 criteria occur.\nEducator\n•\tProvides descriptive task feedback to all students throughout their learning that clearly links to learning goal and success criteria\n•\tProvides feedback about strengths and offers information to guide actionable improvement to all students multiple times throughout the learning process\n•\tPaces instruction to allow for frequent, descriptive feedback to all students and allows time for students to act on the feedback received\n•\tAsks students to self-regulate by assessing their own progress and justifying their assessments multiple times throughout the learning process\n•\tInstructs students to set personal goals based on feedback and self-assessment","proficient":"When teaching students to self-evaluate learning progress, 4/5 criteria occur.","ef_alignment":{"2":"Primary","3":"Secondary","5":"Primary"}},{"ef_stmt":"3 Educators teach students to determine “How do I Close the Gap?”","exemplary":"When teaching students to identify next steps in learning, 4/4 criteria occur.\nEducator\n•\tAssists each student in determining what might be some of the next instructional steps for the individual\n•\tPaces instruction to allow for the feedback loop and focused student revision\n•\tProvides opportunities for students to self- reflect and document their learning\n•\tProvides opportunities for students to share their learning","proficient":"When teaching students to identify next steps in learning, 3/4 criteria occur.","ef_alignment":{"2":"Primary","3":"Secondary","5":"Primary"}}]},"Universal Screening for Tiered Interventions":{"primary":["2","3","4","5","6"],"secondary":["1"],"sub_efs":[{"ef_stmt":"1 The District Leadership Team (DLT) develops and implements a system of universal screening for all students to identifying academic and behavioral gaps and provide tiered intervention.","exemplary":"The district has a universal screening system that meets 11/11 of the indicators below.\n•\tAn assessment calendar includes windows for universal screening data collection related to literacy and behavior.\n•\tAnnual guidance is provided to staff regarding assessment and data collection expectations.\n•\tThe assessment calendar includes dates for three universal screening periods for academics each year. \n•\tSkills assessed through universal screening tools and measures are aligned with literacy and behavior outcomes.\n•\tUniversal screening tools and measures are reliable and valid for predicting which students may be at risk and could benefit from intervention. \n•\tTools and processes are free from cultural, linguistic, or socioeconomic bias.\n•\tCut points/benchmarks/criteria are established to determine which students will receive tiered intervention.\n•\tIndividuals administering universal screening tools receive professional development. \n•\tA process is developed for monitoring the fidelity of implementation related to the universal screening data collection and tiered intervention.\n•\tFeedback from stakeholders is collected to inform improvements in the screening process.\n•\tScreening tools and measures are reviewed annually to ensure they remain effective and relevant.","proficient":"9/11 criteria are met by educators","ef_alignment":{"2":"Primary","3":"Primary","4":"Primary","5":"Secondary","6":"Primary"}},{"ef_stmt":"2 Universal Screening tools and measures are administered consistently and with fidelity.","exemplary":"The district implements an effective universal screening system by meeting 6/6 of the following criteria. \n•\tSelected universal screening tools and measures are used consistently across the district.\n•\tAll students in targeted grade levels are screened. \n•\tUniversal screening data collection occurs within designated windows. \n•\tUniversal screening data is collected at least three times per year (fall, winter, spring) for academics.\n•\tIndividuals administer universal screening tools with fidelity.\n•\tData from fidelity checks are used to improve training and implementation.","proficient":"5/6 criteria are met by educators","ef_alignment":{"2":"Primary","3":"Secondary","4":"Primary","5":"Secondary","6":"Primary"}},{"ef_stmt":"3 DLT, BLTs and CTs use the Universal Screening System data to implement tiered instruction.","exemplary":"The district uses universal screening data to strengthen tiered instruction for all students by meeting 8/8 of the following criteria.\n•\tUniversal screening data is reviewed and used to strengthen Tier 1 instruction at the district level for literacy and behavior. \n•\tUniversal screening data is reviewed and used to strengthen Tier 1 at the building level for literacy and behavior.\n•\tCTs use universal screening data to group students for tiered instruction. \n•\tUniversal Screening data are used in concert with other data sources (e.g., teacher input, classroom performance, diagnostic assessments, and/or short term progress monitoring) to verify decisions about whether a student needs intervention.\n•\tServiceable Base Rates are considered when creating decision rules.\n•\tDecision rules for interpreting data are applied consistently.\n•\tBetween Universal screening intervals, CTs use progress monitoring data to move students between tiers.\n•\tScreening results are communicated to families with clear explanations of next steps.","proficient":"6/8 criteria are met by educators","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Primary","5":"Primary","6":"Primary"}}]},"School-Based Implementation Coaching (SBIC)":{"primary":["1","3","5","6"],"secondary":["2","4"],"sub_efs":[{"ef_stmt":"1 Educators develop and maintain coaching relationships.","exemplary":"Educators meet 5/5 criteria for developing and maintaining coaching relationships.\n• Create reciprocal partnerships\n• Communicate about coaching purpose and practices\n• Allow teachers to identify needs and to choose coaching support\n• Acknowledge and address differences\n• Build teacher leadership capacity","proficient":"4/5 criteria are met by educators","ef_alignment":{"1":"Primary","5":"Primary","6":"Primary"}},{"ef_stmt":"2 Educators provide effective feedback.","exemplary":"Effective feedback provided by educators meets 6/6 criteria.\n• Provide informal positive feedback immediately after the session\n• Use specific, descriptive, and actionable verbal feedback\n• Use specific, descriptive, and actionable written feedback\n• Start with positive feedback focusing on specific examples that indicate strengths of practice\n• Reaffirm the positive and then mutually address growth elements with specific language and examples\n• Celebrate growth within the practices","proficient":"5/6 criteria are met by educators","ef_alignment":{"1":"Secondary","3":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"3 Educators develop a strategic and differentiated coaching plan.","exemplary":"Coaching plans developed by educators meet 5/5 criteria.\n• Align coaching plan focus to school building/district vision and goals\n• Support educators in self-assessment using the Practice Profile of the effective educational practice(s)\n• Support educators in development of growth goal.\n• Establish methods of data collection for indicators of progress\n• Share a plan for gradual release of responsibility","proficient":"4/5 criteria are met by educators","ef_alignment":{"1":"Secondary","3":"Primary","4":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"4 Educators use solution dialogue.","exemplary":"Solution dialogue meets 7/7 criteria.\n• Facilitate conversation about what has gone well and where more support is needed\n• Facilitate conversation about relevant data\n• Respond to ideas for improvement by validating, adding suggestions, and providing rationale for changes in practice\n• Support suggestions for change in practice by modeling examples of the content/practice in use\n• Provide opportunity for reflection and clarification of recommendations\n• Offer opportunity or resources for guided practice\n• Facilitate identifying next steps","proficient":"6/7 criteria are met by educators","ef_alignment":{"1":"Primary","3":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"5 Educators progress monitor implementation of effective educational practices.","exemplary":"Educators progress monitor implementation of effective educational practices meeting all 3/3 criteria and four modes of gathering evidence.\n• Gather evidence to monitor progress toward growth goal plan using four modes\no Observation\no Video recording themselves\no Student evidence (classroom discourse, student work)\no Journaling\n• Reflect on evidence to determine growth toward goal\n• Determine next steps","proficient":"3/3 criteria are met by educators","ef_alignment":{"1":"Secondary","2":"Secondary","4":"Secondary","5":"Primary","6":"Primary"}}]},"Collective Teacher Efficacy (CTE)":{"primary":["1","3","5","6"],"secondary":["2","4"],"sub_efs":[{"ef_stmt":"1 District/Building leaders provide opportunities for teachers to experience the four sources of efficacy, and teachers have a combined belief that they have a major impact on student learning","exemplary":"When considering the last 12 months, educators strongly agree the following 5 criteria are true of their experience.\nThey have successfully implemented a new instructional strategy or practice learned in training (affective state).\nThey have received feedback and encouragement regarding the implementation of an instructional strategy or practice learned in training (social persuasion).\nThey have seen others in their building implement a new instructional strategy or practice learned in training (vicarious experience).\nThey have collected informal or formal data to indicate they have successfully implemented a new instructional strategy or practice learned in training (mastery experience).\nThey report they have the resources and support needed to make a major impact on\nstudent learning.","proficient":"When considering the last 12 months, educators mostly agree the 5 criteria are true of their experience.","ef_alignment":{"1":"Secondary","2":"Secondary","3":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"2 District/Building leaders provide opportunities for teacher collaboration that encourages the development of social networks focused on improving instructional practice.","exemplary":"When considering the last 12 months, educators strongly agree the following 4 criteria are true of their experience.\nThey participate in conversations with other teachers about ways to improve instruction 3 or more times per week.\nTheir collaborative conversations with other teachers are helpful for improving instructional practice.\nThey are part of formal and informal collaborative social networks.\nThey experience shared leadership within teams.","proficient":"When considering the last 12 months, educators mostly agree the 4 criteria are true of their experience.","ef_alignment":{"1":"Primary","5":"Primary","6":"Primary"}},{"ef_stmt":"3 District/Building leaders design school structures, promote professional development, and allot time in ways that support the development of teacher leadership.","exemplary":"When considering the last 12 months, educators strongly agree they participate in school leadership opportunities through the following 5 criteria.\nWork focused on school and/or district improvement\nProfessional development provided by themselves and/or colleagues\nWork focused on strengthening school and/or district curriculum\nOpportunities to participate in professional organizations\nWork focused on family/community partnerships","proficient":"When considering the last 12 months, educators mostly agree the 5 criteria are true of their experience.","ef_alignment":{"1":"Primary","5":"Secondary","6":"Primary"}},{"ef_stmt":"4 District/Building leaders establish a climate that values teacher voice in decision making.","exemplary":"When considering major decisions in their school and district over the last 12 months, educators strongly agree the following five criteria are true of their experience.\nThe decision-making process is transparent\nThe decision-making process includes opportunities for teachers to share their ideas and expertise\nI had an opportunity to have an influential voice in decisions\nI trust those in the decision-making role\nA collaborative problem-solving approach is used to generate ideas/solutions","proficient":"When considering the last 12 months, educators mostly agree the five criteria are true of their experience.","ef_alignment":{"1":"Primary","5":"Secondary","6":"Primary"}},{"ef_stmt":"5 District/Building leaders design intentional supports that promote collaborative teacher inquiry.","exemplary":"When considering the last 12 months, educators strongly agree the following 6 criteria are true of their teamsâ€™ experience using collaborative inquiry.\nUses a formal structure (meeting times, teams, and process are defined)\nIs built around compelling problems of instruction\nInvolves collaborative collection and analysis of data relevant to identified problem of instruction\nResults in collective commitment to a plan to address student needs\nIncludes evaluation of the plan and further adjustments\nImproves teachers understanding and teaching practices","proficient":"When considering the last 12 months, educators mostly agree the 6 criteria are true of their experience.","ef_alignment":{"1":"Secondary","2":"Secondary","3":"Primary","4":"Secondary","6":"Primary"}}]},"Systems Leadership":{"primary":["1","3","4","5","6"],"secondary":["2"],"sub_efs":[{"ef_stmt":"1 Leadership develops, aligns, and monitors a system-wide plan for implementation focusing on impact within a cycle of continuous improvement.","exemplary":"There is a system-wide plan for continuous improvement that meets all of the criteria below.\n• Alignment with district-wide initiatives\n• A district-wide common focus with specific and attainable goals\n• Building goals aligned with the district-wide common focus\n• A mechanism for feedback from all levels\n• A year-long district-wide professional learning structure that is practice specific\n• A process for the collection of multiple sources of data to inform progress toward district and building performance goals\n• A schedule for the analysis of key performance indicators at all administrative/educator levels for the purpose of monitoring impact\n• Specific practice-based strategies focused on increasing the impact that teachers are having on students collectively across the district\nLeadership teams regularly engage in formal problem-solving using district/building-level data.","proficient":"5/8 of the criteria for a system-wide plan for continuous improvement are met\nand\nleadership teams regularly engage in formal problem-solving using district/building level data","ef_alignment":{"1":"Primary","2":"Secondary","3":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"2 Leadership sets a path for continuous improvement that is data informed and occurs within a collaborative school culture.","exemplary":"Leadership establishes a sustainable school improvement approach that includes all of the criteria below.\n• A high-quality District Leadership Team as evidenced through member roles, team function, and records of meetings\n• Building Leadership Teams as evidenced through member roles, team function, and records of meetings\n• Collaborative Team structures that distribute responsibility resulting in all educators (administrators and teachers) assuming collective responsibility for the well-being of the student population\n• A process for aligning and monitoring performance goals throughout the district both across buildings and instructional levels, as well as within buildings and grade levels\n• A communication plan that provides information and data on a formal and frequent basis to communicate with district, building, and community collaborators\n• A district-wide open communication network that supports dialogue and discussion across the district about teaching and the recognition/identification of high impact practices","proficient":"The first 4/6 criteria are met","ef_alignment":{"1":"Primary","2":"Secondary","3":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"3 Leadership models and facilitates qualities of trust and growth mindset as key to a culture of continuous improvement.","exemplary":"A. Leadership builds an organizational culture of trust that leads to all of the criteria below.\n• Belief by teachers that the leadership’s actions are consistent with shared values\n• Belief by teachers that the leadership follows through on commitments\n• Belief by teachers that the leadership values all staff\n• Belief by teachers that they have the ability to positively affect student learning\nB. Leadership promotes and models a growth mindset by meeting all of the criteria below.\nSetting both long- and short-term organizational goals\n• Seeking teacher feedback and input regularly\n• Providing teachers with constructive, detailed feedback\n• Creating opportunities for teachers to observe each other’s classes to learn from one another\n• Discussing both successes and failures with teachers as opportunities for learning\n• Valuing effort as the path to mastery","proficient":"3/4 criteria for A are met\nand\n4/6 criteria for B are met","ef_alignment":{"1":"Primary","3":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"4 Leadership empowers educators at all levels to active engagement in continuous improvement and collective responsibility for student growth.","exemplary":"A. Leadership builds a supportive environment by meeting all of the criteria below.\n• Establishment of district-wide goals that address the needs of all students\n• Selection, ongoing training, and implementation of evidence-based methods aligned with the shared district focus\n• Use of data at all levels for the purpose of establishing and addressing priority areas of emphasis\n• Design and support for a system of School-Based Implementation Coaching\nB. Leadership ensures that all of the following key components are used and supported across the district.\n• Collaborative Teams\n• Common Formative Assessment\n• Data-Based Decision Making\n• Developing Assessment Capable Learners with Feedback\n• Metacognition","proficient":"3/4 criteria for A are met\nand\n3/5 criteria for B are met","ef_alignment":{"1":"Secondary","3":"Primary","4":"Primary","5":"Primary","6":"Primary"}}]},"Instructional Leadership":{"primary":["1","2","3","4","5","6"],"secondary":[],"sub_efs":[{"ef_stmt":"1 A collaborative culture and climate is visible through the students, teachers, and administrators","exemplary":"The school leadership provides a supportive environment that includes all of the proficient criteria, plus meets 3/4 of the following.\n• Discovering and developing the capacity in staff\n• Creating a new paradigm/vision for school culture\n• Promoting inclusion for all\n• Modeling an attitude of serving","proficient":"The school leadership provides a supportive environment that includes 4/5 criteria.\n• Safe environment for all as evidenced by feelings of trust, respect, and communication\n• Teachers help each other, including on-going training\n• Teachers support all students in every classroom\n• The school is culturally responsive in a way that is multidimensional, empowering and transformative\n• A building leadership team is established and of high quality as evidenced though member roles, team function and norms, and records of meetings","ef_alignment":{"1":"Primary","4":"Secondary","6":"Secondary"}},{"ef_stmt":"2 Leadership supports and ensures\nthat teaching and learning practices engage all students\nin meaningful learning.","exemplary":"Select and implement evidence- based effective methods that include all of the following.\n• Are not content related\n• Are tied to teacher standards\n• Are implemented with fidelity\n• Inform decisions of progress through regularly scheduled formative assessments selected by appropriate teams","proficient":"Select and implement evidence- based effective methods that include all of the following.\n• Are not content related\n• Are tied to teacher standards\n• Are implemented with fidelity\n• Inform decisions of progress through assessment methods selected by the instructor","ef_alignment":{"1":"Secondary","2":"Secondary","3":"Secondary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 Leaders develop teacher capacity to use formative assessment through supportive\ndata climates facilitating the use of formative data.","exemplary":"Building leaders work with teacher teams to select and/or create research-based formative assessment methods that include 4/4 of the following criteria.\n• Clearly defined outcomes\n• A problem-solving model\n• Structured assessment criteria\n• Selected and constructed responses","proficient":"Building leaders work with teachers on research-based formative assessment methods that include 3/4 of the exemplary criteria.","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Secondary","5":"Primary","6":"Primary"}},{"ef_stmt":"4 Leaders initiate evidence-based decisions and processes\nthat focus on outcomes.","exemplary":"Leadership teams establish systems to support frequent and regularly scheduled team- based decision making that are linked to multiple levels of data and establish priorities (such as knowledge, time, evaluation, and resources) for the school year.","proficient":"Building leaders establish systems to support regular team-based decision making that are linked to multiple levels of data and establish 2 or more priorities (such as knowledge, time, evaluation, and resources) for the school year.","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Secondary","5":"Primary","6":"Primary"}}]},"Metacognition":{"primary":["5"],"secondary":["3"],"sub_efs":[{"ef_stmt":"1 Educators engage in metacognitive instruction to increase students’ knowledge of cognition.","exemplary":"Educators engage in metacognitive instruction to increase students’ knowledge of cognition by implementing 5/5 criteria.\n• Teach the importance and benefits of metacognitive thinking\n• Provide students with opportunities to understand their personal learning style preferences\n• Increase student cognitive awareness by building declarative, procedural, and conditional knowledge\n• Explicitly teach, model, and label cognitive and self-regulatory strategies\n• Establish classroom structures and design lessons that help students understand and build their cognitive awareness","proficient":"4/5 criteria are met by educators","ef_alignment":{"5":"Primary"}},{"ef_stmt":"2 Educators engage students in metacognitive regulation processes for planning, monitoring, controlling, and evaluating.","exemplary":"Educators engage students in metacognitive regulation processes by implementing 4/4 criteria.\n• Planning strategies to help students focus on what needs to be learned and how they will learn it (e.g., goal setting, activating prior knowledge, organizational tools, higher order questioning, etc.)\n• Monitoring strategies to help students focus on how they are learning (e.g., self-questioning, think-alouds, self-assessment, journals, etc.)\n• Controlling strategies that help students regulate their learning (e.g., self check-ins, relaxing muscles, positive self-talk, etc.)\n• Evaluating strategies that help students consider how effectively they learned (e.g., written prompts, self-reflection tools, exit tickets, etc.)","proficient":"3/4 criteria are met by educators","ef_alignment":{"3":"Secondary","5":"Primary"}},{"ef_stmt":"3 Educators create a classroom culture and environment conducive to developing, encouraging, and supporting metacognitive thinking.","exemplary":"Educators create a classroom culture and environment conducive to metacognitive thinking by implementing 6/6 criteria.\n• Develop classroom norms that support a climate of optimism, academic risk-taking, and growth mindset\n• Set high expectations, clear goals, and opportunities for reflective thinking\n• Model and encourage the use of language that clearly describes thinking\n• Provide learner-centered rigorous tasks and convey that productive struggle is part of the learning process\n• Develop a physical environment that promotes and supports metacognition\n• Allocate time, opportunities, and interactions that promote metacognitive thought","proficient":"5/6 criteria are met by educators","ef_alignment":{"5":"Primary"}}]},"Common Formative Assessment (CFA)":{"primary":["1","2","3","4","5"],"secondary":["6"],"sub_efs":[{"ef_stmt":"1 Educators develop and use clear and meaningful learning targets to guide instruction and clarify student learning.","exemplary":"Educators develop and use learning targets that meet 4/4 criteria.\n• Learning targets are clearly connected to essential learning in a domain.\n• Learning targets indicate what students are expected to know, understand, and be able to do at the end of the lesson/unit.\n• Learning targets engage students in higher-order thinking processes.\n• Learning targets are clearly explained to students.","proficient":"Educators develop and use learning targets that are clearly connected to essential learning in a domain and meet 3/4 criteria.","ef_alignment":{"2":"Primary","3":"Secondary","4":"Secondary","5":"Primary","6":"Secondary"}},{"ef_stmt":"2 Educators establish measurable student success criteria to clarify learning.","exemplary":"Educators develop and use student success criteria that meet 5/5 criteria.\n• Success criteria are closely aligned with learning targets.\n• Success criteria indicate what the student will say, do, make, or write to show evidence of learning.\n• Success criteria reflect progress toward the learning goal.\n• Success criteria are communicated in student-friendly language.\n• Educators refer to success criteria during instruction.","proficient":"Educators develop and use student success criteria that are aligned with learning targets and meet 4/5 criteria.","ef_alignment":{"2":"Primary","3":"Secondary","4":"Secondary","5":"Primary","6":"Secondary"}},{"ef_stmt":"3 Educators elicit evidence of learning through daily formative assessments to monitor student understanding and improve instruction.","exemplary":"Educators elicit evidence of learning through daily formative assessments that meet 4/4 criteria.\n• Teachers design discussions, tasks, and activities that effectively elicit evidence of learning.\n• Evidence of student learning is collected and used during lessons to fine-tune instruction.\n• Teachers provide opportunities for students to be learning resources for one another through formative assessment.\n• Teachers provide opportunities for students to engage in self-evaluation.","proficient":"Educators collect and use evidence of learning during lessons to fine tune instruction and meet 3/4 criteria.","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Secondary","5":"Primary","6":"Secondary"}},{"ef_stmt":"4 Educators elicit evidence of learning through common formative assessments to improve instruction and student achievement.","exemplary":"Educators elicit evidence of learning through common formative assessments that meet 4/4 criteria.\n• CFAs are collaboratively developed.\n• CFAs are scaffolded to reflect a progression of learning.\n• CFAs are aligned with learning intentions and success criteria.\n• CFAs indicate which students are on track, which students would benefit from extension, and which students would benefit from additional instruction.","proficient":"Educators elicit evidence of learning through common formative assessments that are collaboratively developed and meet 3/4 criteria.","ef_alignment":{"1":"Primary","2":"Primary","3":"Primary","4":"Primary","5":"Primary","6":"Secondary"}},{"ef_stmt":"5 Educators interpret and act on formative assessment data to provide feedback and improve student learning.","exemplary":"Educators interpret and act on formative assessment data in ways that meet 5/5 criteria.\n• Educators use evidence (data) to adjust instruction based on student need.\n• Educators provide timely, actionable feedback relative to the three important feedback questions (Where am I going? Where am I now? How do I close the gap?).\n• Teacher feedback to students is clearly aligned to learning targets and success criteria.\n• Educators provide feedback appropriate to the learning needs of students.\n• Educators provide feedback that encourages student thinking.","proficient":"Educators use formative assessment data to adjust instruction based on student need and meet 4/5 criteria.","ef_alignment":{"1":"Secondary","2":"Primary","3":"Primary","4":"Primary","5":"Primary","6":"Secondary"}}]},"Family-School Partnerships":{"primary":["1","2","6"],"secondary":["3","4","5"],"sub_efs":[{"ef_stmt":"1 The district builds and sustains collaborative partnerships with families.","exemplary":"The district builds and sustains collaborative partnerships with families by meeting 7/7 of the following criteria.\n• Gathers feedback from families about their needs, concerns, and suggestions for improvement (e.g., surveys, meetings, suggestion boxes)\n• Uses data/feedback to assess and refine family-school partnerships\n• Communicates with families the actions taken in response to their suggestions and feedback\n• Keeps families informed about district initiatives, programs, and supports through regular, multi-modal communication (e.g., newsletters, texts, emails, phone calls, social media)\n• Ensures families are supported in learning how to partner with schools\n• Organizes events (e.g., back-to-school nights, open houses, curriculum nights, home visits) to build shared understanding and trust with families\n• Creates and sustains a welcoming school environment by building staff understanding of the contexts that shape family engagement","proficient":"5/7 or 6/7 criteria are met by educators","ef_alignment":{"1":"Primary","4":"Secondary","5":"Secondary","6":"Primary"}},{"ef_stmt":"2 The district engages families as partners in supporting student learning and development.","exemplary":"The district engages families as partners in supporting student learning and development by meeting 5/5 of the following criteria.\n• Ensures families receive understandable information about the curriculum, learning goals, and behavioral expectations\n• Ensures ongoing, two-way communication with families regarding Tiers 2 and 3 interventions to support collaborative decision making\n• Provides guidance to families regarding how to support Tiers 2 and 3 interventions at home\n• Organizes workshops to empower families to support student learning (e.g., parenting skills; academic and behavioral development; understanding data; teaching strategies; college and career readiness)\n• Engages with the community in which families live to better understand available resources and opportunities to support student learning","proficient":"4/5 criteria are met by educators","ef_alignment":{"1":"Primary","2":"Primary","4":"Secondary","5":"Secondary","6":"Secondary"}},{"ef_stmt":"3 The district promotes shared leadership by actively engaging families in decision making.","exemplary":"The district promotes shared leadership through actively engaging families in decision making by meeting 4/4 of the following criteria.\n• Creates and maintains structures that enable meaningful family-school partnerships (e.g., formal decision making roles; leadership roles; input on policy and budget; involvement in school improvement planning; staff recruitment; family advisory councils)\n• Develops and sustains family partnership opportunities that encourage participation in school activities and collaboration with other families (e.g., volunteering; supporting school climate and safety; networking)\n• Ensures partnership opportunities are representative of the entire school community\n• Ensures materials are available and accessible to families in understandable formats, language, and literacy levels","proficient":"3/4 criteria are met by educators","ef_alignment":{"1":"Primary","2":"Primary","3":"Secondary","4":"Secondary","5":"Secondary","6":"Primary"}}]}},"data_sources":{"1":{"TFI":{"T1: TEAMS":["TFI 1. Team Composition: Tier 1 team includes a Tier 1 systems coordinator, a school administrator, a family member, and individuals able to provide (a) applied behavioral expertise, (b) coaching expertise, (c) knowledge of student academic and behavior patterns, (d) knowledge about the operations of the school across grade levels and programs, and for high schools, (e) student representation."],"T1: IMPLEMENTATION":["TFI 10. Faculty Involvement: Faculty are shown school-wide data regularly and provide input on universal foundations (e.g., expectations, acknowledgements, definitions, consequences) at least every 12 months.","TFI 11. Student/Family/Community Involvement: Stakeholders (students, families, and community members) provide input on universal foundations (e.g., expectations, consequences, acknowledgements) at least every 12 months."],"T2: TEAMS":["TFI 1. Team Composition: Tier 2 (or combined Tier 2 & 3) team includes a Tier 2 systems coordinator and individuals able to provide (a) applied behavioral expertise, (b) administrative authority, (c) knowledge of students, and (d) knowledge about operation of school across grade levels and programs.","TFI 2. Team Operating Procedures: Tier 2 team meets at least monthly and has (a) regular meeting format/agenda, (b) minutes, (c) defined meeting roles, and (d) a current action plan."],"T3: TEAMS":["TFI 1. Team Composition: Tier 3 systems planning team (or combined Tier 2 & 3 team) includes a Tier 3 systems coordinator and individuals who can provide (a) applied behavioral expertise, (b) administrative authority, (c) multi-agency supports (e.g., person centered planning, wraparound, RENEW) expertise, (d) knowledge of students, and (e) knowledge about the operations of the school across grade levels and programs.","TFI 2. Team Operating Procedures: Tier 3 team meets at least monthly and has (a) regular meeting format/agenda, (b) minutes, (c) defined meeting roles, and (d) a current action plan."],"T3: RESOURCES":["TFI 6. Student/Family/Community Involvement: Tier 3 team has district contact person(s) with access to external support agencies and resources for planning and implementing non-schoolbased interventions (e.g., intensive mental health) as needed."],"T3: EVALUATION":["TFI 16. Level of Use: Team follows written process to track proportion of students participating in Tier 3 supports, and access is proportionate"]},"SAS":{"T1: SCHOOLWIDE":["SAS 1. Team Composition In my school, a team exists for schoolwide social-emotionalbehavioral support, planning, and problem solving and the school administrator is an active member of the team.","SAS 9. Staff Involvement In my school, a
