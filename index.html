ll staff have an opportunity to provide input on core practices (e.g., teaching schoolwide expectations, acknowledging expected behavior, responding to behavior errors, requesting assistance) at least annually.","SAS 10. Student / Family / Community Communication My school has a documented process for informing students, families and members of the school community about expected student behaviors at school (e.g., newsletters, brochures, website).","SAS 11. Student / Family / Community Engagement My school seeks input on core practices (e.g., teaching schoolwide expectations, acknowledging expected behavior, responding to behavior errors) from students, families and members of the school community at least annually."],"T2: SYSTEMS":["SAS 1. Behavior Support Team A Tier 2 team with an administrator as an active member exists, meets regularly, and shares updates with staff.","SAS 2. Team Procedures The Tier 2 team has developed a process for regularly engaging and communicating with staff (e.g., process for gathering staff input, questions, and/or concerns for meeting agendas).","SAS 4. Request for Assistance The Tier 2 team has developed a formal process available to all staff, families, and students for requesting additional behavior support.","SAS 8. Level of Use The Tier 2 team routinely shares with staff the proportion of students participating in Tier 2."],"T3: SYSTEMS":["SAS 1. Tier 3 Systems Planning Team A Tier 3 team with an administrator and a member with socialemotional- behavioral expertise meets regularly, and shares updates with staff.","SAS 2. Team Procedures The Tier 3 team has developed a process for regularly engaging and communicating with staff (e.g., process for gathering staff input, questions, and/or concerns for meeting agendas).","SAS 4. Request for Assistance A Tier 3 team uses a formal process available to all staff, families and students requesting additional intensive, individualized socialemotional- behavioral support.","SAS 8. Stakeholder Engagement Staff, families and students are engaged in planning, implementing and evaluating individualized behavior support plans.","SAS 12. Level of Use Our Tier 3 Team routinely shares with staff the proportions of students participating in Tier 3."]},"DSFI":{"LEADERSHIP TEAMING":["DSFI 1.2 Team Membership District Leadership Team has representation from range of stakeholders including at least: (a) families, (b) general education, (c) special education, (d) individuals with detailed knowledge about the current social-emotional-behavioral initiatives, and (e) members of the local community that have investment in youth outcomes.","DSFI 1.7 Communication with Executive Leadership District Leadership Team engages in regularly scheduled (e.g., monthly) and ongoing, two-way communication with executive leadership regarding implementation progress and outcomes related to student behavior goals and implementation of PBIS framework.","DSFI 1.8 Communication with Key Stakeholders District Leadership Team regularly (e.g., quarterly) uses two-way communication with other stakeholders (e.g., school boards, families, community organization leaders, politicians, youth) to solicit feedback on implementation progress and link to district outcomes."],"STAKEHOLDER ENGAGEMENT":["DSFI 2.1 Stakeholder Involvement A written process is developed and deployed to actively involve stakeholders (e.g., school boards, families, community organization leaders, politicians, youth) in goalsetting and policy development.","DSFI 2.3 Stakeholder Participation District leaders (e.g., superintendent, board of education) actively and visibly participate in PBIS events and activities (e.g., attend annual events, visit implementation sites, acknowledge progress) to engage stakeholders."],"TRAINING":["DSFI 6.5 Communities of Practice In-district and/or out-of-district peer networking opportunities focused on PBIS are available and regularly accessed by school and team leaders, district or school level coaches, and/or district/school level teams."],"EVALUATION":["DSFI 8.10 Acknowledgement of Progress Outcomes and accomplishments are disseminated and acknowledged among stakeholder groups, at least quarterly."]},"MTSS Inventory":{"Collaborative Culture & Climate":["MTSS Inventory Establish a district leadership team (DLT) and designate a district-level contact person.","MTSS Inventory Meet monthly to collaborate as a DLT and monitor implementation.","MTSS Inventory Designate building-level contact person (for each participating building) who will disseminate information to faculty and staff in their build.","MTSS Inventory Develop a district protocol to review all work, initiatives, and programs.","MTSS Inventory Develop an action plan aligned to the district's CSIP."],"Multi-Tiered System of Support (MTSS)":["MTSS Inventory Develop a process to engage families in the implementation of a tiered system of support."],"Integration and Sustainability of Continuous Efforts":["MTSS Inventory  Collaborate towards the integration and sustainability of their continuous improvement efforts."]},"CWIS":{"":["CWIS Members of the team demonstrate positive, solution-oriented interactions.","CWIS My team uses effective teaming practices such as providing agendas, establishing roles, seeking consensus and documenting minutes.","CWIS Building leadership supports the opportunity for teacher-to-teacher observation and feedback.","CWIS The building leader(s) actively problem-solve(s) with my team.","CWIS I receive feedback about my classroom instruction from other teachers.","CWIS Collaborative teams systematically analyze student data during team meetings."]}},"2":{"TFI":{"T1: IMPLEMENTATION":["TFI 5. Problem Behavior Definitions: : School has clear definitions for behaviors that interfere with academic and social success and a clear policy/procedure (e.g., flowchart) for addressing office-managed versus staff-managed problems."],"T1: EVALUATION":["TFI 12. Discipline Data: Tier 1 team has instantaneous access to graphed reports summarizing discipline data organized by the frequency of problem behavior events by behavior, location, time of day, and by individual student."],"T2: TEAMS":["TFI 3. Screening: Tier 2 team uses decision rules and multiple sources of data (e.g., ODRs, academic progress, screening tools, attendance, teacher/family/student nominations) to identify students who require Tier 2 supports."],"T2: EVALUATION":["TFI 10. Level of Use: Team follows written process to track proportion of students participating in Tier 2 supports, and access is proportionate."],"T3: TEAMS":["TFI 3. Screening: Tier 3 team uses decision rules and data (e.g., ODRs, Tier 2 performance, academic progress, absences, teacher/family/student nominations) to identify students who require Tier 3 supports."],"T3: SUPPORT PLAN":["TFI 8. Quality of Life Indicators: Assessment includes student strengths and identification of student/family preferences for individualized support options to meet their stated needs across life domains (e.g., academics, health, career, social).","TFI 9. Academic, Social, and Physical Indicators: Assessment data are available for academic (e.g., reading, math, writing), behavioral (e.g., attendance, functional behavioral assessment, suspension/expulsion), medical, and mental health strengths and needs, across life domains where relevant."]},"SAS":{"T1: SCHOOLWIDE":["SAS 12. Behavior Data System My school has a system for collecting social-emotional-behavioral data and summarizing patterns of student behavior."],"T2: SYSTEMS":["SAS 9. Student Performance Data The Tier 2 team routinely monitors and provides updates about the overall progress of students participating in Tier 2 interventions (e.g., monthly or quarterly)."],"T3: SYSTEMS":["SAS 3. Student Identification The Tier 3 team uses multiple sources of data to identify students who require intensive, individualized social-emotionalbehavioral support.","SAS 11. Student Progress Monitoring Each student’s individual support team has established a formal process for monitoring the progress of students on Tier 3 behavior support plans."]},"DSFI":{"EVALUATION":["DSFI 8.2 Data Collection Systems District and school level data systems (e.g., data collection tools and applications) are in place to (a) promote consistent collection and entry of common data (e.g., team accomplishments, schools involved, fidelity, outcomes disaggregated by subgroup), (b) reflect a range of settings and stakeholders (e.g., community data, student and family perceptions), (c) identify schools or classrooms needing additional training and coaching support, and (d) enable continuous decisionmaking and feedback at all levels (i.e., district, school, classroom).","DSFI 8.5 Assessment and Evaluation Process Assessment and evaluation schedule and process is used at all implementation levels (e.g., student, classroom, district) for examining the extent to which: (a) teams are implementing PBIS, (b) PBIS implementation is improving student outcomes, and (c) the District Leadership Team’s action plan is implemented.","DSFI 8.6 Student Identification Data District provides schools with written guidelines to develop the creation of school-specific datadecision rules to identify students who may need Tier 2 or Tier 3 supports. Guidelines include using multiple sources of data (e.g., discipline events, screening scores, attendance, teacher request for assistance).","DSFI 8.7 Level of Use A documented system is utilized to track proportion of students participating in Tier 2 and Tier 3 supports across the district and enrollment is proportionate."]},"MTSS Inventory":{"Assessment":["MTSS Inventory Develop an assessment system.","MTSS Inventory Establish a process to inform learners and families about assessments."]},"CWIS":{"":["CWIS Teachers in my building use common formative assessments aligned to the Missouri Learning Standards.","CWIS All students in my classroom participate in common formative assessments, including students with disabilities.","CWIS Each student reviews his/her results of common formative assessments with a teacher.","CWIS I use the results from common formative assessment to plan for re-teaching and/or future instruction.","CWIS I participate in professional development where I learn how to monitor student progress.","CWIS My building is implementing a comprehensive literacy assessment system.","CWIS Teams in my building use comprehensive literacy assessment data to monitor student progress and outcomes at Tiers 1, 2 and 3.","CWIS Teams in my building review school-wide discipline data to identify areas for improvement to implement school-wide behavioral interventions."]}},"3":{"TFI":{"T1: EVALUATION":["TFI 13. Data-Based Decision Making: Tier 1 team reviews and uses discipline data at least monthly for decision-making."],"T2: TEAMS":["TFI 4. Request for Assistance: Tier 2 planning team uses written request for assistance form and process that are timely and available to all staff, families, and students"],"T2: EVALUATION":["TFI 11. Student Performance Data: Tier 2 team tracks proportion of students experiencing success (% of participating students being successful) and uses Tier 2 intervention outcomes data and decision rules for progress monitoring and modification."],"T3: SUPPORT PLAN":["TFI 10. Hypothesis Statement: Behavior support plans include a hypothesis statement, including (a) operational description of problem behavior, (b) identification of context where problem behavior is most likely, and (c) maintaining reinforcers (e.g., behavioral function) in this context"],"T3: EVALUATION":["TFI 14. Data System: Aggregated (i.e., overall school-level) Tier 3 data are summarized and reported to staff at least monthly on (a) fidelity of support plan implementation, and (b) impact on student outcomes."]},"SAS":{"T1: SCHOOLWIDE":["SAS 13. Data-based Decision Making In my school, data summarizing patterns of social-emotionalbehavioral data is regularly shared with staff (minimum three times a year) for active decision making and action planning.","SAS 14. Fidelity Data In my school, Tier 1 implementation fidelity data (e.g., classroom observations/walk-throughs, SAS, TFI, BoQ.) and the action plans of the schoolwide behavior support team are shared with staff at least annually.","SAS 15. Annual Evaluation In my school, data reflecting the effectiveness of Tier 1 practices are shared with staff and relevant stakeholders at least annually, including year-by-year comparisons of outcome data (e.g., percentage of students in tiers, equity data, patterns of social-emotional-behavioral data), in a usable format."],"T2: SYSTEMS":["SAS 3. Student Identification The Tier 2 team uses multiple sources of data to identify students who require Tier 2 supports."]},"DSFI":{"LEADERSHIP TEAMING":["DSFI 1.4 Team Leadership District Leadership Team is led or facilitated by a coordinator(s) with: (a) designated time for coordination and (b) experience in data-based decision-making."],"STAKEHOLDER ENGAGEMENT":["DSFI 4.4 Discipline Policy Review District Leadership Team regularly reviews and refines discipline policy to enhance their effects on fidelity of implementation and socialemotional- behavioral and academic outcomes for all student groups."],"EVALUATION":["DSFI 8.3 Evaluation Feedback Loop Data systems are used to provide feedback, according to a district determined schedule, that internal coaches share with school teams to use for problem solving and action planning.","DSFI 8.8 Student Performance Data District Leadership Team tracks proportion of students experiencing success and uses Tier 2 and Tier 3 outcome data and decision rules for system-wide progress monitoring and modification."]},"MTSS Inventory":{"Data-Based Decision Making (DBDM)":["MTSS Inventory Engage in an ongoing cycle of data-based decision making (DBDM).","MTSS Inventory Support collaborative teams in ongoing cycles of DBDM."]},"CWIS":{"":["CWIS My team reviews data at meetings.","CWIS Collaborative teams use a data analysis system that includes examining and reflecting on instruction to identify how student errors may be linked to teacher practice.","CWIS Teams in my building discuss student academic and behavior data jointly to make instructional decisions.","CWIS Teams in my building review instructional practices and student outcomes jointly to adjust supports provided to all students.","CWIS Teams in my building use data to make decisions about moving students among and between tiers for reading instruction.","CWIS In my building, we teach consistent behavioral expectations to all students.","CWIS Teams in my building use data to make decisions about moving students among and between tiers for behavioral supports.","CWIS Teams in my building use multiple sources of data to apply clear decision-making practices/rules to inform tiered behavioral supports."]}},"4":{"TFI":{"T1: IMPLEMENTATION":["TFI 3. Behavioral Expectations: School has five or fewer positively stated behavioral expectations and examples by setting/location for student and staff behaviors (i.e., school teaching matrix) defined and in place.","TFI 6. Discipline Policies: School policies and procedures describe and emphasize proactive, instructive, and/or restorative approaches to student behavior that are implemented consistently.","TFI 8. Classroom Procedures: Tier 1 features (school-wide expectations, routines, acknowledgements, in-class continuum of consequences) are implemented within classrooms and consistent with school-wide systems."],"T2: INTERVENTIONS":["TFI 5. Options for Tier 2 Interventions: Tier 2 team has multiple ongoing behavior support interventions with documented evidence of effectiveness matched to student need.","TFI 6. Tier 2 Critical Features: Tier 2 behavior support interventions provide (a) additional instruction/time for student skill development, (b) additional structure/predictability, and/or (c) increased opportunity for feedback (e.g., daily progress report).","TFI 7. Practices Matched to Student Need: A formal process is in place to select Tier 2 interventions that are (a) matched to student need (e.g., behavioral function), and (b) adapted to improve contextual fit (e.g., culture, developmental level).","TFI 8. Access to Tier 1 Supports: Tier 2 supports are explicitly linked to Tier 1 supports, and students receiving Tier 2 supports have access to, and are included in, Tier 1 supports."],"T3: TEAMS":["TFI 4. Student Support Team: For each individual student support plan, a uniquely constructed team exists (with input/approval from student/ family about who is on the team) to design, implement, monitor, and adapt the student-specific support plan."],"T3: SUPPORT PLAN":["TFI 11. Comprehensive Support: Behavior support plans include or consider (a) prevention strategies, (b) teaching strategies, (c) strategies for removing rewards for problem behavior, (d) specific rewards for desired behavior, (e) safety elements where needed, (f) a systematic process for assessing fidelity and impact, and (g) the action plan for putting the support plan in place.","TFI 12. Formal and Natural Supports: Behavior support plan(s) requiring extensive and coordinated support (e.g., person centered planning, wraparound, RENEW) documents quality of life strengths and needs to be completed by formal (e.g., school/district personnel) and natural (e.g., family, friends) supporters","TFI 13. Access to Tier 1 and Tier 2 Support: Students receiving Tier 3 supports have access to, and are included in, available Tier 1 and Tier 2 supports."],"T3: EVALUATION":["TFI 15. Data-Based Decision Making: Each student’s individual support team meets at least monthly (or more frequently if needed) and uses data to modify the support plan to improve fidelity of plan implementation and impact on quality of life, academic, and behavior outcomes."]},"SAS":{"T1: SCHOOLWIDE":["SAS 2. Behavior Expectations My school has five or fewer positively stated behavior expectations and/or rules defined and in place (i.e., school matrix).","SAS 4. Feedback and Acknowledgment My school has a documented system for acknowledging and providing feedback for expected student behaviors (e.g., verbal statements, reinforcers) that is linked to schoolwide expectations and used across settings.","SAS 5. Behavior Definitions My school has clear descriptions for behaviors that interfere with academic and/or social success and clear definitions between administrator-supported and staff-supported behaviors.","SAS 6. Response to Behavior My school has a documented system (e.g., flowchart) for responding to behaviors that interfere with academic and/or social successes that is linked to schoolwide expectations and used across settings."]},"DSFI":{"STAKEHOLDER ENGAGEMENT":["DSFI 3.6 Options for Tiered Interventions A formal district process is in place to select and support evidencebased Tier 2 and Tier 3 interventions that are: a) matched to student need (e.g. behavioral function) and b) adapted to improve contextual fit (e.g. culture development level).","DSFI 3.8 Operations for Tiered Interventions Funding and organizational resources across related initiatives are assessed and aligned to sustain implementation.","DSFI 4.3 Discipline Guides Discipline policy and procedural guides are posted and distributed at least annually.","DSFI 4.5 Transition Systems Policy and systems exists to support student transitions (e.g., new student, school to school, elementary schools to middle school, middle schools to high school) in the district including processes for orienting to schoolwide expectations/routines and access to interventions."],"COACHING":["DSFI 7.4 Differentiated Coaching Support A plan for differentiated coaching supports is developed and based on phases of implementation, relevant tiers, and data-indicated need."],"EVALUATION":["DSFI 8.4 Differentiated Supports Data system is in place for identifying school teams in need of additional training and coaching support."]},"MTSS Inventory":{"Multi-Tiered System of Support (MTSS)":["MTSS Inventory Develop and document a tiered system of support for academics and behavior.","MTSS Inventory Develop a process to engage families in the implementation of a tiered system of support."]},"CWIS":{"":["CWIS A multi-tiered system of supports (MTSS) framework (including assessment, tiered supports and instruction, and progress monitoring) for improving literacy outcomes is being implemented in my building.","CWIS A multi-tiered system of supports (MTSS) framework (including assessment, tiered supports and instruction, and progress monitoring) for improving behavior outcomes is being implemented in my building.","CWIS All students, regardless of disability status, race/ethnicity, or other identity markers, are included in Tier 1 literacy instruction.","CWIS Teams in my building use multiple sources of data to apply clear decision-making practices/rules to inform tiered reading instruction.","CWIS Teams in my building use behavior data to monitor student progress and outcomes at Tiers 1, 2 and 3."]}},"5":{"TFI":{"T1: IMPLEMENTATION":["TFI 4. Teaching Expectations: Expected academic and social behaviors are taught directly to all students in classrooms and across other campus settings/locations."]},"SAS":{"T1: SCHOOLWIDE":["SAS 3. Teaching Expectations My school has documented and distributed lesson plans and schedule for teaching expected behaviors."],"T1: CLASSROOM":["SAS 1. Behavioral Expectations In my classroom, expected student behaviors (e.g., rules) are stated positively, defined clearly, aligned with schoolwide expectations, posted in a way that can be seen from anywhere in the classroom, and explicitly taught to students.","SAS 2. Procedures and Routines In my classroom, procedures and routines are stated positively, defined clearly, aligned with schoolwide expectations, and explicitly taught to students; procedures and routines are appropriate for age/ grade level and context (e.g., content area, instructional practices).","SAS 3. Feedback and Acknowledgement In my classroom, I use the schoolwide system to provide feedback and acknowledgement for expected student behaviors (e.g., verbal statements, reinforcers).","SAS 4. Response to Behavior In my classroom, I use the schoolwide system (e.g., flowchart) for responding to behaviors that interfere with academic and/or social success.","SAS 5. Active Supervision In my classroom, I engage in active supervision through moving, scanning, and interacting (e.g., precorrects, prompts, feedback) with students.","SAS 6. Actively Engage Students In my classroom, I use a variety of strategies to increase student opportunities to respond (e.g., turn and talk, guided notes, response cards).","SAS 7. Differentiated Instruction I use student data to adjust social-emotional-behavioral, and/or academic supports to meet the needs of a wide range of learners.","SAS 8. Academic Success In my classroom, I monitor each and every student’s progress to ensure academic success on daily assignments, projects, classroom tests, and homework, etc."],"T2: SYSTEMS":["SAS 5. Options for Tier 2 Interventions The Tier 2 team has a menu of interventions that can be selected and/or adapted to address a variety of student social-emotionalbehavior needs (e.g., function of behavior).","SAS 6. Access to Tier 1 Supports Tier 2 interventions are supplemental and explicitly linked to Tier 1 schoolwide expectations, and students participating in Tier 2 interventions also receive Tier 1 supports.","SAS 10. Fidelity of Implementation. A formal process exists for monitoring staff implementation of Tier 2 interventions and data about fidelity of implementation is routinely reported."],"T3: SYSTEMS":["SAS 5. Options for Tier 3 Intervention There is a formal problem-solving process for developing functionbased supports to address the social-emotional-behavior needs of individual students.","SAS 6. Tier 3 Critical Features Behavior support plans include or consider a) strategies for prevention, b) teaching, c) responding to behavior based on function, and d) a safety plan.","SAS 7. Access to Tier 1 and Tier 2 Supports Students participating in Tier 3 interventions also receive or have access to Tier 1 and Tier 2 targeted supports.","SAS 10. Generalization and Maintenance Individualized function-based behavior support plans include processes to generalize and maintain expected behavior.","SAS 13. Fidelity A formal process exists for monitoring staff implementation of Tier 3 behavior support plans and routinely sharing fidelity data."]},"DSFI":{"LEADERSHIP TEAMING":["DSFI 1.3 Team Expertise To ensure fidelity of implementation of PBIS practices and systems in three domains: (a) training, (b) coaching, and (c) evaluation the District Leadership Team includes individuals representing P-12 with social-emotional-behavioral expertise across the full continuum of behavior support (Tiers 1, 2, 3)."],"STAKEHOLDER ENGAGEMENT":["DSFI 4.2 Instructional Approach District policies and procedures describe and emphasize proactive evidence-based strategies to support student social-emotionalbehavioral needs that are implemented consistently."],"COACHING":["DSFI 7.2 Coaching Specialized instructional support personnel (e.g., special educators, counselors, school psychologists, social workers) at school and district levels have social-emotionalbehavioral science expertise that aligns with general PBIS and across the full continuum of behavior support (Tiers 1, 2, 3).","DSFI 7.3 Implementation Process A written process is developed and followed for teaching all relevant staff how to implement each Tier 1, 2, 3 intervention in place and for school sites to request ongoing assistance (e.g., coaching, technical assistance).","DSFI 7.8 Classroom Implementation District coaches review classroom implementation of Tier 1 features (school-wide expectations, routines, acknowledgements, in-class continuum of consequences) to verify that they are implemented with fidelity in classrooms and consistent with schoolwide systems across the district."]},"MTSS Inventory":{"Effective Teaching and Learning Practices":["MTSS Inventory Collaborate with buildings to select and align effective teaching and learning practices at Tiers 1, 2, and 3.","MTSS Inventory Collaborate with buildings to implement effective teaching and learning practices, interventions, and supports at Tiers 1, 2, and 3."]},"CWIS":{"":["CWIS The students in my classroom, including students with disabilities, write/state learning targets using \"I can\" or \"I know\" statements.","CWIS The students in my classroom, including students with disabilities, assess their progress by using evidence of student work (rubrics or portfolios).","CWIS The students in my classroom, including students with disabilities, identify what they should do next in their learning based on self-assessment of their progress.","CWIS Students in my classroom, including students with disabilities, receive feedback on their progress toward their learning targets.","CWIS Student-to-student feedback, focused on improving learning, occurs during instruction.","CWIS Students in my classroom state the success criteria for achieving their learning target.","CWIS My building administrator(s) show(s) they are committed to implementing a core set of effective instructional practices in building classrooms.","CWIS I participate in professional development where I learn to improve instructional practices.","CWIS I receive coaching to facilitate my implementation of evidence-based instructional practices.","CWIS All students, regardless of disability status, race/ethnicity, or other identity markers, are included in Tier 1 behavioral support."]}},"6":{"TFI":{"T1: TEAMS":["TFI 2. Team Operating Procedures: Tier 1 team meets at least monthly and has (a) regular meeting format/agenda, (b) minutes, (c) defined meeting roles, and (d) a current action plan."],"T1: IMPLEMENTATION":["TFI 7. Professional Development: A written process is used for orienting all faculty/staff on 4 core Tier 1 SWPBIS practices: (a) teaching school-wide expectations, (b) acknowledging appropriate behavior, (c) correcting errors, and (d) requesting assistance.","TFI 9. Feedback and Acknowledgement: A formal system (i.e., written set of procedures for specific behavior feedback that is [a] linked to school-wide expectations and [b] used across settings and within classrooms) is in place and used by at least 90% of a sample of staff and received by at least 50% of a sample of students."],"T1: EVALUATION":["TFI 14. Fidelity Data: Tier 1 team reviews and uses SWPBIS fidelity (e.g., SET, BoQ, TIC, SAS, Tiered Fidelity Inventory) data at least annually.","TFI 15. Annual Evaluation: Tier 1 team documents fidelity and effectiveness of Tier 1 practices at least annually (including year-by-year comparisons) that are shared with stakeholders (staff, families, community, district) in a usable format"],"T2: INTERVENTIONS":["TFI 9. Professional Development: A written process is followed for teaching all relevant staff how to refer students and implement each Tier 2 intervention that is in place."],"T2: EVALUATION":["TFI 12. Fidelity Data: Tier 2 team has a protocol for ongoing review of fidelity for each Tier 2 practice.","TFI 13. Annual Evaluation: At least annually, Tier 2 team assesses overall effectiveness and efficiency of strategies, including data-decision rules to identify students, range of interventions available, fidelity of implementation, and on-going support to implementers; and evaluations are shared with staff and district leadership."],"T3: RESOURCES":["TFI 5. Staffing: An administrative plan is used to ensure adequate staff is assigned to facilitate individualized plans for the students enrolled in Tier 3 supports.","TFI 7. Professional Development A written process is followed for teaching all relevant staff about basic behavioral theory, function of behavior, and function-based intervention."],"T3: EVALUATION":["TFI 17. Annual Evaluation: At least annually, the Tier 3 systems team assesses the extent to which Tier 3 supports are meeting the needs of students, families, and school personnel; and evaluations are used to guide action planning."]},"SAS":{"T1: SCHOOLWIDE":["SAS 7. Professional Development System My school has a documented process for orienting all staff and providing ongoing professional development on the schoolwide behavior support system.","SAS 8. Professional Development Content My school has provided professional development on the four core Tier 1 PBIS practices: a) teaching schoolwide expectations, b) acknowledging expected behavior, c) responding to behavior errors, and d) requesting assistance."],"T1: CLASSROOM":["SAS 9. Classroom Professional Development and Support I have regular opportunities to access targeted professional development, assistance, and coaching recommendations for my classroom systems (e.g., observation, instruction, performance feedback)."],"T2: SYSTEMS":["SAS 7. Professional Development Professional development about requesting assistance for students and implementing each Tier 2 intervention is available to staff at least annually.","SAS 11. Annual Evaluation The Tier 2 team shares a summary of yearly data reflecting the effectiveness of Tier 2 practices with staff and other stakeholders, including year-by-year comparisons of outcome data (e.g., students participating, students graduating, students in need of additional support), in a usable format."],"T3: SYSTEMS":["SAS 9. Professional Development Training on function of behavior and implementing function-based individualized supports is available to staff at least annually.","SAS 14. Annual Evaluation The Tier 3 team shares with staff and stakeholders a summary of yearly data reflecting the effectiveness of Tier 3 practices including year-by- year comparisons of outcome data (e.g., students participating, students graduating, students in need of additional support), in a usable format."]},"DSFI":{"LEADERSHIP TEAMING":["DSFI 1.1 Leadership Authority One or more members of the District Leadership Team has the authority to make key decisions (e.g., decision-making for budget, implementation, policy, data systems).","DSFI 1.5 Team Operating Procedures District Leadership Team meets monthly, uses standard meeting agenda and problem-solving process (e.g., Team-Initiated Problem Solving or data-cased decision making) with clearly defined operating procedures.","DSFI 1.6 Action Planning District Leadership Team develops a 3 to 5 year action plan guided by the District Systems Fidelity Inventory (DSFI) results, district strategic plan, schools, annual evaluation (e.g., Tiered Fidelity Inventory), and matches resources to needs based on student outcome data, especially for underserved populations. The team uses the action plan to develop agendas to guide team meetings.","DSFI 1.9 Goal Identification Promotion of positive school climate and student social-emotionalbehavioral health established by district leadership as one of the top five permanent goals or priorities for the next 3 to 5 years."],"STAKEHOLDER ENGAGEMENT":["DSFI 2.2 Information Dissemination District Leadership Team develops one or more tools for communicating information, data, and accomplishments (e.g., website, newsletter, meeting presentations, conferences, media, annual progress reports) targeted to broad stakeholder groups at least annually.","DSFI 3.1 Budget Plan A district budget plan with prioritized funding is developed to support operating structures and capacity building activities to implement PBIS framework.","DSFI 3.2 Community Agency Alignment Procedures exist to ensure that all external community agency work is aligned to PBIS framework, evidence-based-practices, and organizational goals of the district.","DSFI 3.3. Alignment to District Outcomes Academic and social-emotionalbehavioral frameworks are aligned with key district outcomes/ improvement goals.","DSFI 3.4 Alignment to Initiatives Clear description of initiative alignment (e.g., graphic organizer, organizational chart, conceptual map) displays integrated and/or collaborative implementation of PBIS with existing initiatives having similar goals, outcomes, systems, and practices.","DSFI 3.5 Initiative Adoption Procedures A written process is followed for district-level review of fit for new social-emotional-behavioral initiatives or practices with PBIS framework (i.e., evidence base, capacity, contextual fit) before deciding whether to adopt, align, or integrate them.","DSFI 3.7 Annual Alignment Review Periodic formal review (e.g., audit, survey, resource mapping, alignment) of existing socialemotional- behavioral initiatives or programs to determine effectiveness, relevance, and fidelity of implementation is completed at least annually.","DSFI 4.1 Vision/Mission Statement District has a vision/mission statement that includes a rationale and support for the importance of school climate and socialemotional- behavioral health to achieve equitable outcomes for all student groups (and how PBIS can improve both these outcomes and academic achievement) and is articulated into long-term outcomes and endorsed by lead district/school administrators."],"WORKFORCE CAPACITY":["DSFI 5.1 Personnel Selection Criteria Leadership Team provides guidance on hiring criteria, recruitment, and selection for district/school administrators, coaches, and school personnel based on knowledge, skill, and experience implementing PBIS.","DSFI 5.2 Job Descriptions PBIS implementation activities (e.g., training, coaching) are embedded into job descriptions and dedicated time is allotted.","DSFI 5.3 Performance Evaluation Annual performance evaluations of administrators, teachers, and related instructional/support personnel assess knowledge and skills related to PBIS systems implementation as it relates to the specific job."],"TRAINING":["DSFI 6.1 District Professional Development Plan District Leadership Team completes a 3 to 5 year professional development plan guided by school implementation data (e.g., TFI, SAS results) and linked to vision/ mission statement and measurable outcomes.","DSFI 6.2 District Professional Development Calendar Dedicated professional development time and training plans (with clear scope and sequence) are scheduled for PBIS implementation and events are publicly posted to define and shape the goals and process of implementing PBIS (e.g., statewide training calendar, districtwide master schedule).","DSFI 6.3 Professional Development Alignment PBIS professional development materials and professional development practices are aligned with other relevant evidence-based district initiatives.","DSFI 6.4 Ongoing Professional Development At least annually, PBIS is part of orientation with new staff, and refresher sessions are provided with returning/veteran staff.","DSFI 6.6 Internal Professional Development District-wide, internal training capacity is established to build and sustain a PBIS framework."],"COACHING":["DSFI 7.1 Technical Assistance Orientation materials (e.g., handouts, video, website, handbook) are developed and describe implementation rationale, readiness requirements, process, and outcomes.","DSFI 7.5 District Coach Networks Training and support (e.g., clear scope and sequence, technical assistance) are provided to district coaching networks to establish and sustain PBIS expertise and implementation.","DSFI 7.6 Coaching Functions Support emphasizes coaching functions (responsibilities and activities, not people or positions) for internal (school level) and external (district/regional level) implementation supports.","DSFI 7.7 Local Coaching Capacity District has transitioned from outside/external to local/internal/ in-district coaching capacity (e.g., core group identified and supported in leading efforts, embedded in job descriptions)."],"EVALUATION":["DSFI 8.1 Evaluation Plan District Leadership Team completes a 3 to 5 year evaluation plan guided by district assessment schedule and school implementation data, social validity survey results, and important district outcomes.","DSFI 8.9 Annual Evaluation Annual progress reports tailored to external stakeholders are created and distributed at least annually on the activities and outcomes related to PBIS fidelity of implementation and student behavior goals across all tiers of implementation.","DSFI 8.11 Internal Evaluation Capacity District has transitioned from external to internal evaluation and performance feedback capacity (e.g., the District Leadership Team has developed an assessment schedule and performance feedback activities and in district coaches support schools in administering assessments and analyzing results)."],"LOCAL IMPLEMENTATION DEMONSTRATIONS":["DSFI 9.1 Site Selection Formal site selection processes (including readiness requirements and commitment procedures) and criteria are developed, adopted, and consistently used to select: (a) select initial pilot schools and (b) expand to new schools within the district.","DSFI 9.2 Model Demonstrations District has identified model demonstration schools to serve as local examples of process and outcomes across tiers (1, 2, 3) and levels (preschool, elementary, middle, high). Demonstration schools have annual data indicating sustained high levels of fidelity of implementation and visible activities, data, and products.","DSFI 9.3 Scaling Up Plan for additional demonstrations, including replication and scaling of PBIS across tiers and levels (preschool, elementary, middle, high) in the organizational unit, is developed and followed."]},"MTSS Inventory":{"Integration and Sustainability of Continuous Efforts":["MTSS Inventory  Collaborate towards the integration and sustainability of their continuous improvement efforts."],"Collaborative Culture & Climate":["MTSS Inventory Develop an action plan aligned to the district's CSIP.","MTSS Inventory Meet monthly to collaborate as a DLT and monitor implementation.","MTSS Inventory Develop a district protocol to review all work, initiatives, and programs."]},"CWIS":{"":["CWIS Building leader(s) effectively manage initiatives and expectations placing a focus on improving educational practices.","CWIS In my building, resources (e.g., fiscal, personnel, time, etc.) are available to all staff for supporting all students using a MTSS framework of instructional practices, including students with disabilities."]}}}};
const C={"1": {"bg": "#1B4F8A", "accent": "#2E6DB4", "light": "#EBF3FF", "badge": "#BDD7EE"}, "2": {"bg": "#2D6A3F", "accent": "#3A8A52", "light": "#EBF7EE", "badge": "#C6EFCE"}, "3": {"bg": "#8B5E00", "accent": "#B57B00", "light": "#FFF8E6", "badge": "#FFEB9C"}, "4": {"bg": "#8B2000", "accent": "#C0392B", "light": "#FFF0EB", "badge": "#FFC7CE"}, "5": {"bg": "#5B1E6B", "accent": "#7B3FA0", "light": "#F5EEFF", "badge": "#E4D0F5"}, "6": {"bg": "#2C2C2C", "accent": "#555555", "light": "#F2F2F2", "badge": "#D9D9D9"}};
const EF_SHORT={"1": "Collaborative Culture", "2": "Assessment", "3": "Data-Based Decisions", "4": "Tiered Supports", "5": "Teaching & Learning", "6": "Integration & Sustainability"};

let activeEF = null;

function buildSelector() {
  const row = document.getElementById('efRow');
  ['1','2','3','4','5','6'].forEach(n => {
    const c = C[n];
    const btn = document.createElement('button');
    btn.className='ef-btn'; btn.id='efbtn'+n;
    btn.style.cssText=`color:${c.accent};border-color:${c.badge}`;
    btn.innerHTML=`<span class="num">${n}</span><span class="lbl">${EF_SHORT[n]}</span>`;
    btn.onclick=()=>selectEF(n);
    row.appendChild(btn);
  });
}

function selectEF(n) {
  if (activeEF) {
    const pb=document.getElementById('efbtn'+activeEF);
    if(pb){pb.classList.remove('active');pb.style.background='#fff';}
  }
  activeEF=n;
  const c=C[n];
  const btn=document.getElementById('efbtn'+n);
  btn.classList.add('active');
  btn.style.background=c.light;
  btn.style.borderColor=c.accent;
  renderEF(n);
}

function fmtText(text, accentColor) {
  if (!text || text==='nan') return '<em style="color:#ccc">Not available</em>';
  const lines = text.replace(/\r/g,'').split('\n');
  let html='';
  for (const raw of lines) {
    const t=raw.trim();
    if (!t) continue;
    if (/^[A-Z]\./.test(t))                              html+=`<span class="ch" style="color:${accentColor||'#333'}">${t}</span>`;
    else if (t.startsWith('o\t')||t.startsWith('o '))    html+=`<span class="sb">${t}</span>`;
    else if (t.startsWith('•')||t.startsWith('-'))       html+=`<span class="b">${t}</span>`;
    else                                                  html+=`<span style="display:block">${t}</span>`;
  }
  return html;
}

function extractRatio(text) {
  const m=(text||'').match(/(\d+\/\d+)/); return m?m[1]:null;
}

function profIsJustThreshold(profText) {
  if (!profText || profText==='nan') return true;
  const cleaned = profText.replace(/\r?\n/g,' ').trim();
  return cleaned.length < 120 && !cleaned.includes('•') && !/[A-Z]\./.test(cleaned);
}

function renderEF(n) {
  const ef=D.efs[n]; const c=C[n]; const ds=D.data_sources[n]||{};
  const primaryMods=[]; const secondaryMods=[];
  for (const [name,mod] of Object.entries(D.modules)) {
    if (mod.primary.includes(n)) primaryMods.push(name);
    else if (mod.secondary.includes(n)) secondaryMods.push(name);
  }
  document.getElementById('main').innerHTML=
    renderBanner(ef,n,c)+renderCriteria(ef,c)+
    renderModules(n,primaryMods,secondaryMods,c)+
    renderDataSources(n,ds,c);

  document.querySelectorAll('.mod-trigger').forEach(btn=>
    btn.addEventListener('click',()=>btn.closest('.mod-row').classList.toggle('open')));
  document.querySelectorAll('.sub-ef-trigger').forEach(btn=>
    btn.addEventListener('click',()=>btn.closest('.sub-ef-row').classList.toggle('open')));

  const tabs=document.querySelectorAll('.ds-tab');
  tabs.forEach(tab=>tab.addEventListener('click',()=>{
    tabs.forEach(t=>{t.style.background='#fff';t.style.color='#555';t.style.borderColor='#DDE3EA';});
    document.querySelectorAll('.ds-panel').forEach(p=>p.classList.remove('active'));
    tab.style.background=c.accent; tab.style.color='#fff'; tab.style.borderColor=c.accent;
    const panel=document.getElementById('dsp_'+tab.dataset.src);
    if(panel) panel.classList.add('active');
  }));
  if(tabs.length) tabs[0].click();
}

function renderBanner(ef,n,c) {
  return `
  <div class="sec-hd"><span class="sec-hd-lbl">Essential Function</span><span class="sec-hd-rule"></span></div>
  <div class="ef-banner" data-n="${n}" style="background:linear-gradient(135deg,${c.bg} 0%,${c.accent} 100%)">
    <div class="eyebrow">Essential Function ${n}</div>
    <h2>${ef.title}</h2>
    <div class="stmt">${ef.statement.replace(/^\d+\s*/,'')}</div>
  </div>`;
}

function renderCriteria(ef,c) {
  const exR=extractRatio(ef.exemplary); const prR=extractRatio(ef.proficient);
  return `
  <div class="sec-hd"><span class="sec-hd-lbl">Proficiency Criteria</span><span class="sec-hd-rule"></span></div>
  <div class="criteria-grid">
    <div class="crit-card" style="border-color:${c.accent}">
      <div class="crit-card-label" style="color:${c.accent}">Exemplary
        ${exR?`<span class="ratio-pill" style="background:${c.light};color:${c.accent};border:1px solid ${c.badge}">${exR} criteria</span>`:''}
      </div>
      <div class="crit-body">${fmtText(ef.exemplary,c.accent)}</div>
    </div>
    <div class="crit-card" style="border-color:#B0BEC5">
      <div class="crit-card-label" style="color:#546E7A">Proficient
        ${prR?`<span class="ratio-pill" style="background:#F5F5F5;color:#546E7A;border:1px solid #CFD8DC">${prR} criteria</span>`:''}
      </div>
      <div class="crit-body">${fmtText(ef.proficient,'#546E7A')}</div>
    </div>
  </div>`;
}

function renderModules(n, primaryMods, secondaryMods, c) {

  function modCard(modName) {
    const mod=D.modules[modName]||{};
    const subRows=(mod.sub_efs||[]).filter(sub=>Object.keys(sub.ef_alignment||{}).length>0)
    .map((sub,idx)=>{
      const safeId=modName.replace(/[^a-z0-9]/gi,'_')+'_sub'+idx;
      const efTags=Object.entries(sub.ef_alignment).map(([ef,fit])=>{
        const efObj=D.efs[ef]||{};
        const isPrim=fit==='Primary';
        const fitBg  =isPrim?C[ef]?.light  ||'#eee':'#F5F5F5';
        const fitClr =isPrim?C[ef]?.accent ||'#555':'#666';
        const fitBdr =isPrim?C[ef]?.badge  ||'#ddd':'#DDE3EA';
        return `<div class="ef-tag-row">
          <span class="ef-tag-name" style="color:${C[ef]?.accent||'#555'}">EF ${ef}: ${efObj.title||''}</span>
          <span class="fit-pill" style="background:${fitBg};color:${fitClr};border-color:${fitBdr}">${fit}</span>
        </div>`;
      }).join('');

      const ex=sub.exemplary; const pr=sub.proficient;
      const justThreshold=profIsJustThreshold(pr);
      let critHtml='';
      if (justThreshold) {
        const thresholdText=(pr&&pr!=='nan')?pr.replace(/\r?\n/g,' ').trim():'';
        critHtml=`
          <div class="crit-section">
            <div class="crit-section-hd" style="color:#546E7A">
              Proficiency Threshold${thresholdText?` — <span style="font-weight:400;text-transform:none;letter-spacing:0">${thresholdText}</span>`:''}
            </div>
            <div class="crit-section-hd" style="color:#888;margin-top:10px">Full Criteria (Exemplary standard)</div>
            <div class="crit-section-body">${fmtText(ex,'#555')}</div>
          </div>`;
      } else {
        critHtml=`
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
            <div>
              <div class="crit-section-hd" style="color:#888">Exemplary</div>
              <div class="crit-section-body">${fmtText(ex,'#555')}</div>
            </div>
            <div>
              <div class="crit-section-hd" style="color:#546E7A">Proficient</div>
              <div class="crit-section-body">${fmtText(pr,'#546E7A')}</div>
            </div>
          </div>`;
      }

      return `
      <div class="sub-ef-row" id="${safeId}">
        <button class="sub-ef-trigger">
          <span class="sub-arrow">▶</span>
          <span class="sub-ef-stmt">${sub.ef_stmt}</span>
        </button>
        <div class="sub-ef-body">
          <div style="margin-bottom:10px">${efTags}</div>
          ${critHtml}
        </div>
      </div>`;
    }).join('');

    const safeId=modName.replace(/[^a-z0-9]/gi,'_');
    return `
    <div class="mod-row" id="mod_${safeId}">
      <button class="mod-trigger">
        <span class="mod-name">${modName}</span>
        <span class="arrow">▶</span>
      </button>
      <div class="mod-body">
        <div class="sub-ef-list">
          ${subRows||'<div class="no-content">No sub-elements available.</div>'}
        </div>
      </div>
    </div>`;
  }

  const primHtml = primaryMods.length
    ? primaryMods.map(m=>modCard(m)).join('')
    : '<div class="no-content">No primary modules for this Essential Function.</div>';
  const secHtml = secondaryMods.length
    ? secondaryMods.map(m=>modCard(m)).join('')
    : '';

  return `
  <div class="sec-hd"><span class="sec-hd-lbl">Aligned Modules</span><span class="sec-hd-rule"></span></div>
  <div style="font-size:.82rem;color:#555;background:#FAFBFC;border:1px solid #E8EAED;border-radius:10px;padding:12px 16px;margin-bottom:14px;line-height:1.65">
    Modules with a <strong>Primary</strong> alignment are the main vehicle for developing competency in this Essential Function.
    Modules with a <strong>Secondary</strong> alignment reinforce or support this Essential Function but are not its primary focus.
    Expand any module to see its sub-elements, Essential Function alignments, and proficiency criteria.
  </div>
  ${primaryMods.length ? '<div style="font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#888;margin-bottom:8px;padding-left:2px">Primary Alignment</div>' : ''}
  <div class="mod-list">${primHtml}</div>
  ${secondaryMods.length ? `
    <div style="font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#888;margin:18px 0 8px;padding-left:2px">Secondary Alignment</div>
    <div class="mod-list">${secHtml}</div>` : ''}`;
}

function renderDataSources(n,ds,c) {
  const sources=Object.keys(ds).filter(s=>s!=='PKC');
  if(!sources.length) return `
  <div class="sec-hd"><span class="sec-hd-lbl">Data Sources</span><span class="sec-hd-rule"></span></div>
  <div class="no-content">No data sources found.</div>`;

  const advisory=`<div class="ds-advisory">
    <strong>📋 SAPPs and Knowledge Checks</strong><br>
    In addition to these data sources, it is important to consider the SAPPs and Knowledge Checks that accompany each module.
  </div>`;

  const tabs=sources.map(src=>`<button class="ds-tab" data-src="${src.replace(/\s+/g,'_')}">${src}</button>`).join('');

  const panels=sources.map(src=>{
    const safeId=src.replace(/\s+/g,'_');
    const srcData=ds[src]||{};
    let html=advisory;
    for(const [domain,items] of Object.entries(srcData)){
      html+=`<div class="ds-cat">
        ${domain?`<div class="ds-cat-hd" style="color:${c.accent};border-color:${c.badge}">${domain}</div>`:''}
        ${items.map(item=>`<div class="ds-item" style="border-color:${c.badge}">${item}</div>`).join('')}
      </div>`;
    }
    return `<div class="ds-panel" id="dsp_${safeId}">${html}</div>`;
  }).join('');

  return `
  <div class="sec-hd"><span class="sec-hd-lbl">Data Sources</span><span class="sec-hd-rule"></span></div>
  <div class="ds-tabs">${tabs}</div>
  ${panels}`;
}

buildSelector();
</script>
</body>
</html>
